<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>Screen TV - Smart Connect</title>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg:#06080f; --sur:#0c1220; --card:#101828; --bor:#1c2f50;
            --cy:#00e5ff; --bl:#0057ff; --gr:#00ff9d; --rd:#ff2d55;
            --tx:#b8d0f0; --tx2:#5a7aa8; --wh:#e8f4ff;
        }
        *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
        body{background:var(--bg);font-family:'Exo 2',sans-serif;color:var(--tx);height:100vh;overflow:hidden;}
        
        #app{display:flex;flex-direction:column;height:100vh;max-width:800px;margin:0 auto;position:relative;z-index:1;}
        
        /* Header com ID Automático */
        #hdr{display:flex;align-items:center;justify-content:space-between;padding:0 20px;height:70px;border-bottom:1px solid var(--bor);background:rgba(6,8,15,0.95);}
        .logo-tx{font-weight:900;font-size:22px;color:var(--wh);}
        .id-panel{background:var(--card);border:1px solid var(--cy);border-radius:10px;padding:8px 15px;text-align:right;}
        .id-label{font-size:9px;color:var(--cy);letter-spacing:1px;font-weight:700;}
        .id-val{font-family:'Share Tech Mono',monospace;font-size:20px;color:#fff;letter-spacing:2px;}

        /* Tabs */
        #tabs{display:flex;border-bottom:1px solid var(--bor);background:#0a0f1d;}
        .tab{flex:1;padding:15px;text-align:center;cursor:pointer;font-weight:700;color:var(--tx2);transition:0.3s;}
        .tab.on{color:var(--cy);border-bottom:3px solid var(--cy);background:rgba(0,229,255,0.05);}

        /* Main */
        #panels{flex:1;overflow-y:auto;padding:20px;}
        .pnl{display:none;} .pnl.on{display:block;}

        .card{background:var(--card);border:1px solid var(--bor);border-radius:15px;padding:20px;margin-bottom:20px;}
        .pvw{width:100%;aspect-ratio:16/9;background:#000;border-radius:10px;overflow:hidden;border:1px solid var(--bor);display:flex;align-items:center;justify-content:center;position:relative;}
        video{width:100%;height:100%;object-fit:contain;}
        
        .mctrl{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:15px;}
        .btn{padding:12px;border:none;border-radius:8px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:0.2s;}
        .btn-cy{background:var(--bl);color:#fff;}
        .btn-gh{background:var(--sur);border:1px solid var(--bor);color:var(--tx);}
        .btn-rd{background:rgba(255,45,85,0.1);border:1px solid var(--rd);color:var(--rd);}
        
        .connect-box{display:flex;gap:10px;margin-top:10px;}
        .inp{flex:1;padding:12px;background:#000;border:1px solid var(--bor);border-radius:8px;color:var(--cy);font-family:'Share Tech Mono',monospace;font-size:18px;text-align:center;}
        
        .status-dot{width:10px;height:10px;border-radius:50%;display:inline-block;margin-right:5px;}
        .online{background:var(--gr);box-shadow:0 0 10px var(--gr);}

        .slog{background:#000;padding:10px;height:80px;overflow-y:auto;font-family:'Share Tech Mono',monospace;font-size:11px;border-radius:8px;color:var(--tx2);margin-top:10px;}
    </style>
</head>
<body>
<div id="app">
    <div id="hdr">
        <div><div class="logo-tx">SCREEN TV</div></div>
        <div class="id-panel" onclick="copyMyID()">
            <div class="id-label">MEU ID DE CONEXÃO</div>
            <div class="id-val" id="my-id">GERANDO...</div>
        </div>
    </div>

    <div id="tabs">
        <div class="tab on" data-target="p-send">ENVIAR SINAL</div>
        <div class="tab" data-target="p-receive">RECEBER SINAL</div>
    </div>

    <div id="panels">
        <div class="pnl on" id="p-send">
            <div class="card">
                <div class="pvw">
                    <video id="localVideo" autoplay playsinline muted></video>
                    <div id="localOvl" style="position:absolute;">🎥 PRONTO PARA TRANSMITIR</div>
                </div>
                <div class="mctrl">
                    <button class="btn btn-cy" onclick="startCapture('screen')">📺 Tela</button>
                    <button class="btn btn-cy" onclick="startCapture('camera')">📷 Câmera</button>
                    <button class="btn btn-gh" onclick="document.getElementById('fileInp').click()">🖼️ Galeria</button>
                    <button class="btn btn-rd" onclick="stopAll()">🛑 Parar</button>
                </div>
                <input type="file" id="fileInp" hidden accept="image/*,video/*" onchange="handleFile(event)">
            </div>

            <div class="card">
                <div class="id-label" style="margin-bottom:10px">CONECTAR A OUTRA TV</div>
                <div class="connect-box">
                    <input type="text" id="remoteID" class="inp" placeholder="DIGITE O ID ALVO">
                    <button class="btn btn-cy" style="padding:0 25px" onclick="connectToPeer()">CONECTAR</button>
                </div>
            </div>
        </div>

        <div class="pnl" id="p-receive">
            <div class="card">
                <div class="pvw">
                    <video id="remoteVideo" autoplay playsinline></video>
                    <div id="remoteOvl" style="position:absolute; text-align:center;">
                        <div class="id-val">AGUARDANDO CONEXÃO</div>
                        <p style="font-size:12px; color:var(--tx2)">Informe seu ID para o transmissor</p>
                    </div>
                </div>
            </div>
        </div>

        <div class="slog" id="sysLog">> Screen TV iniciado.</div>
    </div>
</div>

<script>
// --- LÓGICA DO PEER (ID AUTOMÁTICO) ---
let peer;
let myId = "";
let localStream;

// Inicializa o PeerJS (Gera o ID automaticamente)
function initPeer() {
    // Gerando um ID aleatório de 6 números para facilitar
    const randomId = Math.floor(100000 + Math.random() * 900000).toString();
    peer = new Peer(randomId);

    peer.on('open', (id) => {
        myId = id;
        document.getElementById('my-id').innerText = id;
        log("Seu ID está ativo: " + id);
    });

    // Quando alguém me liga (estou recebendo sinal)
    peer.on('call', (call) => {
        log("Recebendo chamada de vídeo...");
        call.answer(); // Atende a chamada
        call.on('stream', (remoteStream) => {
            const rv = document.getElementById('remoteVideo');
            rv.srcObject = remoteStream;
            document.getElementById('remoteOvl').style.display = "none";
        });
    });

    peer.on('error', (err) => {
        log("Erro: " + err.type, "var(--rd)");
    });
}

// --- FUNÇÕES DE TRANSMISSÃO ---
async function startCapture(type) {
    try {
        localStream = (type === 'screen') 
            ? await navigator.mediaDevices.getDisplayMedia({ video: true, audio: true })
            : await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
        
        document.getElementById('localVideo').srcObject = localStream;
        document.getElementById('localOvl').style.display = "none";
        log("Captura de " + type + " iniciada.");
    } catch (e) {
        log("Erro ao capturar: " + e.message, "var(--rd)");
    }
}

function connectToPeer() {
    const targetId = document.getElementById('remoteID').value;
    if (!targetId) return alert("Digite o ID do receptor!");
    if (!localStream) return alert("Inicie a Tela ou Câmera antes de conectar!");

    log("Tentando conectar ao ID: " + targetId);
    const call = peer.call(targetId, localStream);
    
    call.on('stream', () => {
        log("Transmissão estabelecida!", "var(--gr)");
    });
}

// --- UTILITÁRIOS ---
function log(msg, color = "") {
    const l = document.getElementById('sysLog');
    l.innerHTML += `<div style="color:${color}">> ${msg}</div>`;
    l.scrollTop = l.scrollHeight;
}

function stopAll() {
    if(localStream) localStream.getTracks().forEach(t => t.stop());
    document.getElementById('localVideo').srcObject = null;
    document.getElementById('localOvl').style.display = "flex";
    log("Transmissão encerrada.");
}

function copyMyID() {
    navigator.clipboard.writeText(myId);
    alert("ID Copiado: " + myId);
}

// Navegação de abas
document.querySelectorAll('.tab').forEach(tab => {
    tab.onclick = () => {
        document.querySelectorAll('.tab, .pnl').forEach(el => el.classList.remove('on'));
        tab.classList.add('on');
        document.getElementById(tab.dataset.target).classList.add('on');
    };
});

window.onload = initPeer;
</script>
</body>
  </html>
