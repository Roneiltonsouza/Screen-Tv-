<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Screen TV</title>
<link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@300;400;600;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#06080f;--surface:#0c1220;--card:#101828;--card2:#131f32;
  --border:#1c2f50;--border2:#243a60;
  --cyan:#00e5ff;--blue:#0057ff;--green:#00ff9d;
  --orange:#ff7b00;--red:#ff2d55;--purple:#bf5fff;
  --text:#b8d0f0;--text2:#5a7aa8;--white:#e8f4ff;
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{background:var(--bg);font-family:'Exo 2',sans-serif;color:var(--text);height:100%;overflow:hidden;}

.bg-fx{position:fixed;inset:0;pointer-events:none;z-index:0;
  background:radial-gradient(ellipse 60% 40% at 15% 50%,rgba(0,87,255,.06) 0%,transparent 70%),
             radial-gradient(ellipse 50% 60% at 85% 30%,rgba(0,229,255,.05) 0%,transparent 70%);}
.grid-bg{position:fixed;inset:0;pointer-events:none;z-index:0;
  background-image:linear-gradient(rgba(0,229,255,.025) 1px,transparent 1px),
                   linear-gradient(90deg,rgba(0,229,255,.025) 1px,transparent 1px);
  background-size:50px 50px;}

.app{position:relative;z-index:1;display:flex;flex-direction:column;height:100vh;max-width:1280px;margin:0 auto;}

/* Header */
header{display:flex;align-items:center;justify-content:space-between;padding:0 20px;height:56px;
  border-bottom:1px solid var(--border);background:rgba(6,8,15,.9);backdrop-filter:blur(12px);flex-shrink:0;}
.logo{display:flex;align-items:center;gap:12px;}
.logo-mark{width:36px;height:36px;background:linear-gradient(135deg,var(--blue),var(--cyan));
  border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;
  box-shadow:0 0 18px rgba(0,229,255,.35);}
.logo-text{font-weight:900;font-size:20px;letter-spacing:1px;
  background:linear-gradient(90deg,#fff 30%,var(--cyan));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.logo-sub{font-size:10px;color:var(--text2);letter-spacing:3px;display:block;margin-top:-4px;font-family:'Share Tech Mono',monospace;}
.id-badge{display:flex;align-items:center;gap:10px;background:var(--card);border:1px solid var(--border);
  border-radius:10px;padding:6px 14px;cursor:pointer;transition:border-color .2s;}
.id-badge:hover{border-color:var(--cyan);}
.id-badge .lbl-s{font-size:10px;color:var(--text2);letter-spacing:2px;font-family:'Share Tech Mono',monospace;}
.id-badge .id-val{font-family:'Share Tech Mono',monospace;font-size:18px;font-weight:700;color:var(--cyan);letter-spacing:3px;}
.hdr-right{display:flex;align-items:center;gap:8px;font-family:'Share Tech Mono',monospace;font-size:11px;color:var(--text2);}
.status-dot{width:8px;height:8px;border-radius:50%;background:var(--text2);transition:all .3s;}
.status-dot.live{background:var(--green);box-shadow:0 0 8px var(--green);animation:blink 1.4s infinite;}
.status-dot.scan{background:var(--cyan);box-shadow:0 0 8px var(--cyan);animation:blink .7s infinite;}
.status-dot.err{background:var(--red);box-shadow:0 0 8px var(--red);}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}

/* Tabs */
.tabs-wrap{display:flex;gap:2px;padding:10px 20px 0;border-bottom:1px solid var(--border);
  background:rgba(6,8,15,.7);flex-shrink:0;overflow-x:auto;}
.tab{padding:8px 18px;border-radius:8px 8px 0 0;font-size:13px;font-weight:600;cursor:pointer;
  color:var(--text2);border:1px solid transparent;border-bottom:none;transition:all .2s;white-space:nowrap;}
.tab.active{background:var(--card);border-color:var(--border);border-bottom-color:var(--card);
  color:var(--white);margin-bottom:-1px;}
.tab:hover:not(.active){color:var(--cyan);}

/* Panels */
.panels-wrap{flex:1;overflow-y:auto;overflow-x:hidden;}
.panels-wrap::-webkit-scrollbar{width:5px;}
.panels-wrap::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
.panel{display:none;padding:20px;}
.panel.active{display:block;}

/* Grid layouts */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
.g3{display:grid;grid-template-columns:2fr 1fr;gap:16px;}
.fcol{display:flex;flex-direction:column;gap:12px;}

/* Card */
.card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:20px;position:relative;overflow:hidden;}
.card::after{content:'';position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,rgba(0,229,255,.35),transparent);}
.card-title{font-family:'Share Tech Mono',monospace;font-size:10px;letter-spacing:3px;color:var(--text2);
  text-transform:uppercase;margin-bottom:14px;display:flex;align-items:center;gap:10px;}
.card-title::after{content:'';flex:1;height:1px;background:var(--border);}

/* Buttons */
.btn{padding:10px 16px;border:none;border-radius:9px;font-family:'Exo 2',sans-serif;font-weight:700;
  font-size:13px;cursor:pointer;transition:all .18s;display:inline-flex;align-items:center;
  gap:7px;white-space:nowrap;letter-spacing:.4px;}
.btn-cyan{background:linear-gradient(135deg,var(--blue),var(--cyan));color:#fff;box-shadow:0 0 18px rgba(0,229,255,.2);}
.btn-cyan:hover{box-shadow:0 0 28px rgba(0,229,255,.4);transform:translateY(-1px);}
.btn-green{background:linear-gradient(135deg,#00b368,var(--green));color:#000;}
.btn-green:hover{transform:translateY(-1px);box-shadow:0 0 20px rgba(0,255,157,.3);}
.btn-ghost{background:var(--surface);border:1px solid var(--border);color:var(--text);}
.btn-ghost:hover{border-color:var(--cyan);color:var(--cyan);}
.btn-red{background:rgba(255,45,85,.1);border:1px solid var(--red);color:var(--red);}
.btn-red:hover{background:rgba(255,45,85,.2);}
.btn-purple{background:linear-gradient(135deg,#7a00cc,var(--purple));color:#fff;}
.btn-purple:hover{transform:translateY(-1px);}
.btn-orange{background:linear-gradient(135deg,#c55a00,var(--orange));color:#fff;}
.btn:disabled{opacity:.3;cursor:not-allowed;transform:none!important;}
.btn-full{width:100%;justify-content:center;}
.btn-sm{padding:7px 12px;font-size:11px;}

/* Input */
.inp{width:100%;padding:10px 13px;background:var(--surface);border:1px solid var(--border);
  border-radius:9px;color:var(--white);font-family:'Exo 2',sans-serif;font-size:14px;outline:none;transition:border-color .2s;}
.inp:focus{border-color:var(--cyan);}
.inp::placeholder{color:var(--text2);}
.lbl{font-size:12px;color:var(--text2);display:block;margin-bottom:6px;letter-spacing:.4px;}

/* Preview video */
.preview-wrap{aspect-ratio:16/9;background:#000;border-radius:10px;border:2px solid var(--border);
  position:relative;overflow:hidden;margin-bottom:12px;}
.preview-wrap video,.preview-wrap img.prev-img{width:100%;height:100%;object-fit:contain;display:block;}
.preview-wrap img.prev-img{position:absolute;inset:0;}
.prev-overlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;
  justify-content:center;gap:8px;background:rgba(0,0,0,.75);transition:opacity .3s;pointer-events:none;}
.prev-overlay.hidden{opacity:0;}
.prev-icon{font-size:48px;opacity:.3;}
.prev-overlay p{font-size:13px;color:var(--text2);text-align:center;line-height:1.6;}

/* Progress */
.prog-row{display:flex;justify-content:space-between;font-size:11px;color:var(--text2);
  margin-bottom:5px;font-family:'Share Tech Mono',monospace;}
.prog-bar{height:3px;background:var(--border);border-radius:2px;overflow:hidden;cursor:pointer;margin-bottom:10px;}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--blue),var(--cyan));border-radius:2px;
  transition:width .15s;box-shadow:0 0 5px var(--cyan);width:0%;}

/* Media controls */
.mctrl{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-bottom:10px;}
.mc-btn{width:42px;height:42px;border-radius:8px;background:var(--surface);border:1px solid var(--border);
  color:var(--text);font-size:17px;cursor:pointer;transition:all .18s;
  display:flex;align-items:center;justify-content:center;}
.mc-btn:hover{border-color:var(--cyan);color:var(--cyan);}
.vol-row{display:flex;align-items:center;gap:10px;font-size:15px;}
input[type=range]{flex:1;-webkit-appearance:none;height:3px;background:var(--border);border-radius:2px;outline:none;}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;
  background:var(--cyan);border-radius:50%;cursor:pointer;box-shadow:0 0 6px var(--cyan);}

/* Stats */
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;}
.stat-box{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:10px;text-align:center;}
.stat-val{font-family:'Share Tech Mono',monospace;font-size:18px;color:var(--cyan);font-weight:700;}
.stat-lbl{font-size:9px;color:var(--text2);letter-spacing:2px;margin-top:2px;text-transform:uppercase;}

/* Now playing bar */
.now-bar{display:flex;align-items:center;gap:8px;padding:8px 12px;
  background:rgba(0,255,157,.06);border:1px solid rgba(0,255,157,.25);
  border-radius:8px;margin-bottom:10px;font-size:12px;color:var(--green);font-family:'Share Tech Mono',monospace;}
.now-dot{width:6px;height:6px;border-radius:50%;background:var(--green);animation:blink 1s infinite;flex-shrink:0;}

/* Sub-tabs */
.sub-tabs{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap;}
.sub-tab{padding:5px 14px;border-radius:20px;border:1px solid var(--border);background:var(--surface);
  color:var(--text2);font-size:11px;font-family:'Share Tech Mono',monospace;cursor:pointer;transition:all .2s;white-space:nowrap;}
.sub-tab.active{border-color:var(--cyan);color:var(--cyan);background:rgba(0,229,255,.08);}
.sub-tab:hover:not(.active){color:var(--text);border-color:var(--border2);}

/* Drop zone */
.drop-z{border:2px dashed var(--border);border-radius:10px;padding:20px;text-align:center;
  cursor:pointer;position:relative;transition:all .2s;}
.drop-z:hover,.drop-z.drag{border-color:var(--cyan);background:rgba(0,229,255,.03);}
.drop-z input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;}
.drop-z .dz-icon{font-size:26px;margin-bottom:8px;}
.drop-z p{font-size:13px;color:var(--text2);}
.drop-z strong{color:var(--cyan);}

/* Gallery */
.gallery-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(72px,1fr));gap:6px;margin-top:10px;}
.gi{aspect-ratio:1;border-radius:8px;overflow:hidden;cursor:pointer;
  border:2px solid transparent;transition:all .18s;position:relative;background:var(--surface);}
.gi:hover{border-color:var(--cyan);transform:scale(1.05);}
.gi.active-gi{border-color:var(--green);box-shadow:0 0 8px rgba(0,255,157,.3);}
.gi img,.gi video{width:100%;height:100%;object-fit:cover;display:block;}
.gi-badge{position:absolute;bottom:3px;right:3px;font-size:9px;background:rgba(0,0,0,.75);
  border-radius:3px;padding:1px 4px;color:#fff;font-family:monospace;}

/* Channel list */
.ch-list{display:flex;flex-direction:column;gap:6px;max-height:380px;overflow-y:auto;padding-right:4px;}
.ch-list::-webkit-scrollbar{width:4px;}
.ch-list::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
.ch-item{display:flex;align-items:center;gap:10px;padding:9px 12px;background:var(--surface);
  border:1px solid var(--border);border-radius:9px;cursor:pointer;transition:all .18s;animation:fadeIn .2s ease;}
@keyframes fadeIn{from{opacity:0;transform:translateX(-6px)}to{opacity:1;transform:none}}
.ch-item:hover{border-color:var(--purple);background:rgba(191,95,255,.05);}
.ch-item.playing{border-color:var(--green);background:rgba(0,255,157,.04);}
.ch-ico{width:36px;height:36px;background:var(--card);border-radius:7px;
  display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;overflow:hidden;}
.ch-ico img{width:100%;height:100%;object-fit:contain;}
.ch-name{font-size:13px;font-weight:600;color:var(--white);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1;}
.ch-cat{font-size:10px;color:var(--text2);font-family:'Share Tech Mono',monospace;margin-top:2px;}
.live-tag{font-size:9px;padding:2px 7px;border-radius:10px;border:1px solid var(--red);
  color:var(--red);background:rgba(255,45,85,.1);font-family:'Share Tech Mono',monospace;
  animation:blink 1.5s infinite;flex-shrink:0;}

/* Search */
.search-wrap{position:relative;margin-bottom:12px;}
.search-wrap .inp{padding-left:34px;}
.search-wrap::before{content:'🔍';position:absolute;left:11px;top:50%;transform:translateY(-50%);font-size:13px;pointer-events:none;}

/* Filter bar */
.filter-bar{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px;}

/* Saved lists */
.sl-item{display:flex;align-items:center;gap:10px;padding:9px 12px;background:var(--surface);
  border:1px solid var(--border);border-radius:9px;cursor:pointer;transition:all .18s;margin-bottom:7px;animation:fadeIn .2s ease;}
.sl-item:hover{border-color:var(--cyan);}
.sl-item.sl-active{border-color:var(--green);background:rgba(0,255,157,.03);}
.sl-info{flex:1;min-width:0;}
.sl-name{font-size:13px;font-weight:700;color:var(--white);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.sl-meta{font-size:10px;color:var(--text2);font-family:'Share Tech Mono',monospace;margin-top:2px;}
.sl-actions{display:flex;gap:5px;flex-shrink:0;}
.sl-act{width:27px;height:27px;border-radius:7px;border:1px solid var(--border);background:var(--card);
  color:var(--text2);font-size:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .18s;}
.sl-act:hover{border-color:var(--cyan);color:var(--cyan);}
.sl-act.del:hover{border-color:var(--red);color:var(--red);}

/* Device list */
.dev-list{display:flex;flex-direction:column;gap:7px;}
.dev-item{display:flex;align-items:center;gap:11px;padding:11px 13px;background:var(--surface);
  border:1px solid var(--border);border-radius:10px;cursor:pointer;transition:all .18s;animation:fadeIn .25s ease;}
.dev-item:hover{border-color:var(--cyan);transform:translateX(3px);}
.dev-item.conn{border-color:var(--green);background:rgba(0,255,157,.04);}
.dev-ico{width:36px;height:36px;background:var(--card);border-radius:8px;
  display:flex;align-items:center;justify-content:center;font-size:19px;flex-shrink:0;}
.dev-info{flex:1;}
.dev-name{font-size:13px;font-weight:700;color:var(--white);}
.dev-meta{font-size:11px;color:var(--text2);font-family:'Share Tech Mono',monospace;}
.sig{display:flex;gap:2px;align-items:flex-end;height:15px;}
.sig span{width:3px;background:var(--border);border-radius:1px;}
.sig span:nth-child(1){height:4px}.sig span:nth-child(2){height:8px}.sig span:nth-child(3){height:11px}.sig span:nth-child(4){height:15px;}
.dev-item.conn .sig span{background:var(--green);}
.dev-item:hover:not(.conn) .sig span{background:var(--cyan);}
.badge{font-size:9px;padding:2px 7px;border-radius:14px;border:1px solid;font-family:'Share Tech Mono',monospace;}
.badge-g{color:var(--green);border-color:var(--green);background:rgba(0,255,157,.1);}
.badge-c{color:var(--cyan);border-color:var(--cyan);background:rgba(0,229,255,.1);}

/* Radar */
.radar-wrap{display:flex;flex-direction:column;align-items:center;gap:14px;}
.radar{width:150px;height:150px;position:relative;}
.r-ring{position:absolute;border:1px solid rgba(0,229,255,.12);border-radius:50%;
  top:50%;left:50%;transform:translate(-50%,-50%);}
.r-ring:nth-child(1){width:38px;height:38px;}
.r-ring:nth-child(2){width:76px;height:76px;}
.r-ring:nth-child(3){width:114px;height:114px;}
.r-ring:nth-child(4){width:150px;height:150px;}
.r-sweep{position:absolute;top:50%;left:50%;width:75px;height:75px;margin:-75px 0 0 0;
  transform-origin:bottom center;
  background:conic-gradient(from 0deg,transparent 65%,rgba(0,229,255,.55) 100%);
  border-radius:50% 50% 0 0/100% 100% 0 0;display:none;}
.r-sweep.go{display:block;animation:rsweep 2s linear infinite;}
@keyframes rsweep{to{transform:rotate(360deg)}}
.r-center{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  width:8px;height:8px;background:var(--cyan);border-radius:50%;box-shadow:0 0 10px var(--cyan);}
.r-blip{position:absolute;width:9px;height:9px;background:var(--green);border-radius:50%;
  transform:translate(-50%,-50%);box-shadow:0 0 8px var(--green);animation:rblip 1s infinite;display:none;}
@keyframes rblip{0%,100%{opacity:1;transform:translate(-50%,-50%) scale(1)}50%{opacity:.4;transform:translate(-50%,-50%) scale(1.7)}}

/* ID card */
.id-connect-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;}
.id-big-card{background:linear-gradient(135deg,var(--card),var(--card2));
  border:1px solid var(--border);border-radius:14px;padding:24px;text-align:center;position:relative;overflow:hidden;}
.id-big-card::before{content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse at top,rgba(0,229,255,.06),transparent 70%);}
.id-big{font-family:'Share Tech Mono',monospace;font-size:38px;font-weight:700;
  color:var(--cyan);letter-spacing:6px;text-shadow:0 0 20px rgba(0,229,255,.35);margin:12px 0;}
.id-big-card h3{font-size:12px;color:var(--text2);letter-spacing:2px;text-transform:uppercase;}

/* Peer list */
.peer-item{display:flex;align-items:center;gap:10px;padding:9px 12px;background:var(--surface);
  border:1px solid var(--border);border-radius:9px;font-size:13px;margin-bottom:7px;}
.peer-item.you{border-color:var(--green);}
.peer-dot{width:7px;height:7px;border-radius:50%;background:var(--text2);flex-shrink:0;}
.peer-dot.on{background:var(--green);box-shadow:0 0 5px var(--green);}
.peer-name{flex:1;font-weight:600;color:var(--white);}
.peer-id{font-family:'Share Tech Mono',monospace;font-size:11px;color:var(--text2);}

/* Log */
.sys-log{background:#000;border:1px solid var(--border);border-radius:8px;padding:9px;
  height:88px;overflow-y:auto;font-family:'Share Tech Mono',monospace;font-size:10px;color:var(--text2);}
.sys-log::-webkit-scrollbar{width:3px;}
.sys-log::-webkit-scrollbar-thumb{background:var(--border);}
.log-line{line-height:1.9;}
.log-ok{color:var(--green);}.log-info{color:var(--cyan);}.log-warn{color:var(--orange);}.log-err{color:var(--red);}

/* Empty */
.empty-box{text-align:center;padding:28px 16px;color:var(--text2);}
.empty-box .ei{font-size:32px;margin-bottom:8px;opacity:.4;}
.empty-box p{font-size:12px;line-height:1.7;}

/* Flex utils */
.flex-row{display:flex;gap:8px;align-items:center;}
.mt8{margin-top:8px;}.mt12{margin-top:12px;}.mt16{margin-top:16px;}

/* Toast */
.toast{position:fixed;bottom:20px;right:20px;background:var(--card);border:1px solid var(--border);
  border-radius:12px;padding:13px 18px;font-size:14px;z-index:999;
  transform:translateX(260px);opacity:0;transition:all .28s;max-width:260px;
  box-shadow:0 8px 28px rgba(0,0,0,.5);}
.toast.show{transform:translateX(0);opacity:1;}
.toast.t-ok{border-color:var(--green);}.toast.t-err{border-color:var(--red);}.toast.t-info{border-color:var(--cyan);}

/* Modal */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.78);display:flex;align-items:center;
  justify-content:center;z-index:800;backdrop-filter:blur(4px);opacity:0;pointer-events:none;transition:opacity .22s;}
.modal-bg.open{opacity:1;pointer-events:all;}
.modal{background:var(--card);border:1px solid var(--border2);border-radius:16px;padding:28px;
  width:330px;max-width:90vw;transform:scale(.92);transition:transform .22s;}
.modal-bg.open .modal{transform:scale(1);}
.modal h2{font-size:16px;font-weight:700;color:var(--white);margin-bottom:8px;}
.modal p{font-size:13px;color:var(--text2);margin-bottom:18px;line-height:1.6;}
.modal-btns{display:flex;gap:10px;}
.modal-btns .btn{flex:1;justify-content:center;}

/* IPTV cast badge */
.cast-badge{font-size:10px;padding:2px 8px;border-radius:10px;border:1px solid var(--cyan);
  color:var(--cyan);margin-left:auto;flex-shrink:0;}

/* Save row */
.save-row{display:flex;gap:8px;margin-top:8px;}
.save-row .inp{flex:1;}

/* Mobile */
@media(max-width:680px){
  .g2,.g3,.stats-grid,.id-connect-grid{grid-template-columns:1fr;}
  .panel{padding:12px;}
  .id-big{font-size:26px;}
  .stats-grid{grid-template-columns:repeat(2,1fr);}
}
</style>
</head>

<div cla
