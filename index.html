<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>Screen TV - Ultra Smooth</title>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        :root { --bg:#05070a; --sur:#0a0f18; --card:#0f172a; --bor:#1e293b; --cy:#00f2ff; --bl:#0066ff; --gr:#00ff88; --rd:#ff3366; --tx:#cbd5e1; }
        *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
        body{background:var(--bg);font-family:'Exo 2',sans-serif;color:var(--tx);height:100vh;overflow:hidden;}
        #app{display:flex;flex-direction:column;height:100vh;max-width:600px;margin:0 auto;}
        
        /* Header & ID */
        #hdr{display:flex;align-items:center;justify-content:space-between;padding:0 15px;height:65px;border-bottom:1px solid var(--bor);background:rgba(5,7,10,0.9);}
        .id-panel{background:var(--card);border:1px solid var(--cy);border-radius:8px;padding:5px 12px;cursor:pointer;text-align:right;}
        .id-val{font-family:'Share Tech Mono',monospace;font-size:18px;color:#fff;letter-spacing:1px;}

        /* Tabs */
        #tabs{display:flex;background:#080c14;}
        .tab{flex:1;padding:12px;text-align:center;cursor:pointer;font-weight:700;color:#64748b;font-size:12px;transition:0.3s;}
        .tab.on{color:var(--cy);border-bottom:2px solid var(--cy);background:rgba(0,242,255,0.05);}

        /* Main View */
        #panels{flex:1;overflow-y:auto;padding:12px;}
        .pnl{display:none;} .pnl.on{display:block;}
        .card{background:var(--card);border:1px solid var(--bor);border-radius:12px;padding:12px;margin-bottom:12px;position:relative;}
        
        .pvw-container{width:100%;aspect-ratio:16/9;background:#000;border-radius:10px;overflow:hidden;border:1px solid var(--bor);position:relative;display:flex;align-items:center;justify-content:center;}
        video, canvas {width:100%;height:100%;object-fit:contain;image-rendering: crisp-edges;}
        
        /* Floating Controls */
        .v-tools{position:absolute;bottom:8px;right:8px;display:flex;gap:6px;}
        .v-btn{background:rgba(0,0,0,0.7);border:1px solid rgba(255,255,255,0.1);color:#fff;width:36px;height:36px;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;}
        
        .recording-dot{width:10px;height:10px;background:var(--rd);border-radius:50%;position:absolute;top:10px;left:10px;display:none;box-shadow:0 0 10px var(--rd);animation:pulse 1s infinite;}

        /* Buttons */
        .mctrl{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px;}
        .btn{padding:10px;border:none;border-radius:6px;font-weight:700;cursor:pointer;font-size:11px;display:flex;align-items:center;justify-content:center;gap:5px;}
        .btn-cy{background:var(--bl);color:#fff;}
        .btn-gh{background:var(--sur);border:1px solid var(--bor);color:var(--tx);}
        .btn-rd{background:rgba(255,51,102,0.1);border:1px solid var(--rd);color:var(--rd);}
        
        @keyframes pulse { 0%{opacity:1;} 50%{opacity:0.3;} 100%{opacity:1;} }
        .inp{width:100%;padding:10px;background:#000;border:1px solid var(--bor);border-radius:6px;color:var(--cy);margin-top:5px;font-family:'Share Tech Mono',monospace;}
        .slog{background:#000;padding:8px;height:50px;overflow-y:auto;font-family:'Share Tech Mono',monospace;font-size:10px;border-radius:6px;color:#475569;margin-top:8px;border:1px solid var(--bor);}
    </style>
</head>
<body>
<div id="app">
    <div id="hdr">
        <div style="font-weight:900; font-size:18px; color:var(--cy);">SCREEN TV <small style="font-size:8px; font-weight:400; color:var(--gr);">SMOOTH</small></div>
        <div class="id-panel" onclick="copyId()">
            <div id="my-id" class="id-val">000000</div>
        </div>
    </div>

    <div id="tabs">
        <div class="tab on" data-target="p-send">ENVIAR</div>
        <div class="tab" data-target="p-receive">RECEBER</div>
    </div>

    <div id="panels">
        <div class="pnl on" id="p-send">
            <div class="card">
                <div class="pvw-container" id="localBox">
                    <video id="localVideo" autoplay playsinline muted></video>
                    <canvas id="photoCanvas" style="display:none"></canvas>
                    <div class="v-tools"><button class="v-btn" onclick="toggleFS('localBox')">⛶</button></div>
                </div>
                <div class="mctrl">
                    <button class="btn btn-cy" onclick="startCapture('screen')">📱 Tela</button>
                    <button class="btn btn-cy" onclick="startCapture('camera')">📷 Câmera</button>
                    <button class="btn btn-gh" onclick="document.getElementById('fileInp').click()">🖼️ Galeria</button>
                    <button class="btn btn-rd" onclick="location.reload()">🛑 Sair</button>
                </div>
                <input type="file" id="fileInp" hidden accept="image/*,video/*" onchange="handleFile(event)">
            </div>
            <div class="card">
                <input type="text" id="remoteID" class="inp" placeholder="DIGITE O ID DO RECEPTOR">
                <button class="btn btn-cy" style="width:100%; margin-top:8px; height:45px;" onclick="connectToPeer()">🚀 INICIAR TRANSMISSÃO</button>
            </div>
        </div>

        <div class="pnl" id="p-receive">
            <div class="card">
                <div class="pvw-container" id="remoteBox">
                    <div id="recDot" class="recording-dot"></div>
                    <video id="remoteVideo" autoplay playsinline></video>
                    <div class="v-tools">
                        <button id="recBtn" class="v-btn" onclick="toggleRecord()" style="color:var(--rd)">●</button>
                        <button class="v-btn" onclick="toggleFS('remoteBox')">⛶</button>
                    </div>
                </div>
                <div id="sysLog" class="slog">> Aguardando sinal...</div>
            </div>
        </div>
    </div>
</div>

<script>
const firebaseConfig = { apiKey: "AIzaZtnv4FdBRJg86c3ISVIHojdQOb92L891sa3", databaseURL: "https://screentv-p2p-default-rtdb.firebaseio.com" };
firebase.initializeApp(firebaseConfig);

let peer, myId, localStream, remoteStream, mediaRecorder, recordedChunks = [];

// --- OTIMIZAÇÃO DE VÍDEO (ANTI-TRAVAMENTO) ---
const videoConstraints = {
    video: {
        width: { ideal: 1280, max: 1280 },
        height: { ideal: 720, max: 720 },
        frameRate: { ideal: 24, max: 30 }
    },
    audio: { echoCancellation: true, noiseSuppression: true }
};

function initPeer() {
    myId = localStorage.getItem('screentv_persistent_id') || Math.floor(100000 + Math.random() * 900000).toString();
    localStorage.setItem('screentv_persistent_id', myId);
    document.getElementById('my-id').innerText = myId;
    
    // Configuração de baixa latência
    peer = new Peer(myId, {
        config: {
            'iceServers': [{ 'urls': 'stun:stun.l.google.com:19302' }],
            'sdpSemantics': 'unified-plan'
        },
        debug: 1
    });
    
    peer.on('call', call => {
        call.answer();
        call.on('stream', s => {
            remoteStream = s;
            const rv = document.getElementById('remoteVideo');
            rv.srcObject = s;
            rv.play().catch(e => log("Toque no play para ver."));
        });
    });
}

// --- FUNÇÕES DE CAPTURA COM OTIMIZAÇÃO ---
async function startCapture(type) {
    try {
        if(localStream) localStream.getTracks().forEach(t => t.stop());
        
        if(type === 'screen') {
            localStream = await navigator.mediaDevices.getDisplayMedia({ video: true, audio: true });
        } else {
            localStream = await navigator.mediaDevices.getUserMedia(videoConstraints);
        }
        
        document.getElementById('localVideo').srcObject = localStream;
        log("Sinal otimizado pronto.");
    } catch (e) { log("Erro: " + e.message); }
}

function handleFile(event) {
    const file = event.target.files[0];
    if(!file) return;
    const v = document.getElementById('localVideo');
    const url = URL.createObjectURL(file);

    if(file.type.startsWith('video')) {
        v.src = url; v.play();
        setTimeout(() => {
            // Captura o vídeo da galeria em 24fps fixos para não travar
            localStream = v.captureStream ? v.captureStream(24) : v.mozCaptureStream(24);
            log("Transmitindo vídeo da galeria...");
        }, 500);
    } else {
        const img = new Image();
        img.onload = () => {
            const canvas = document.getElementById('photoCanvas');
            const ctx = canvas.getContext('2d');
            canvas.width = 1280; canvas.height = 720;
            ctx.drawImage(img, 0, 0, 1280, 720);
            v.style.display = "none"; canvas.style.display = "block";
            localStream = canvas.captureStream(1); // Foto em baixa taxa para economizar banda
            log("Foto otimizada pronta.");
        };
        img.src = url;
    }
}

function connectToPeer() {
    const id = document.getElementById('remoteID').value;
    if(!id || !localStream) return alert("Ative a mídia primeiro!");
    
    // Criando a conexão com parâmetros de qualidade reduzida para estabilidade
    const call = peer.call(id, localStream);
    log("Iniciando fluxo estável...");
}

// --- GRAVAÇÃO E TELA CHEIA ---
function toggleFS(id) {
    const el = document.getElementById(id);
    if (!document.fullscreenElement) el.requestFullscreen();
    else document.exitFullscreen();
}

function toggleRecord() {
    if (!remoteStream) return alert("Sem sinal.");
    const btn = document.getElementById('recBtn');
    const dot = document.getElementById('recDot');
    
    if (mediaRecorder && mediaRecorder.state === "recording") {
        mediaRecorder.stop();
        btn.innerHTML = "●"; dot.style.display = "none";
    } else {
        recordedChunks = [];
        mediaRecorder = new MediaRecorder(remoteStream, { mimeType: 'video/webm' });
        mediaRecorder.ondataavailable = e => recordedChunks.push(e.data);
        mediaRecorder.onstop = () => {
            const blob = new Blob(recordedChunks, { type: "video/webm" });
            const a = document.createElement("a");
            a.href = URL.createObjectURL(blob);
            a.download = `Rec_${Date.now()}.webm`;
            a.click();
        };
        mediaRecorder.start();
        btn.innerHTML = "■"; dot.style.display = "block";
        log("Gravando...");
    }
}

function log(m) { const s = document.getElementById('sysLog'); s.innerHTML = "> " + m; }
function copyId() { navigator.clipboard.writeText(myId); alert("ID Copiado!"); }

document.querySelectorAll('.tab').forEach(t => {
    t.onclick = () => {
        document.querySelectorAll('.tab, .pnl').forEach(e => e.classList.remove('on'));
        t.classList.add('on'); document.getElementById(t.dataset.target).classList.add('on');
    }
});

window.onload = initPeer;
</script>
</body>
</html>
