<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>SCREEN TV - PRO TRANS</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">

    <style>
        :root { --bg:#05070a; --card:#0f172a; --bor:#1e293b; --cy:#00f2ff; --bl:#0066ff; --gr:#00ff88; --rd:#ff3366; --tx:#cbd5e1; }
        *{box-sizing:border-box;margin:0;padding:0;}
        body{background:var(--bg);font-family:'Exo 2',sans-serif;color:var(--tx);height:100vh;overflow:hidden;}
        #app{display:flex;flex-direction:column;height:100vh;max-width:500px;margin:0 auto;}
        
        #hdr{display:flex;align-items:center;justify-content:space-between;padding:0 15px;height:65px;border-bottom:1px solid var(--bor);}
        .id-panel{background:var(--card);border:1px solid var(--cy);border-radius:8px;padding:5px 12px;cursor:pointer;}
        
        #tabs{display:flex;background:#080c14;border-bottom:1px solid var(--bor);}
        .tab{flex:1;padding:18px;text-align:center;cursor:pointer;font-weight:900;color:#475569;font-size:12px;text-transform:uppercase;letter-spacing:1px;}
        .tab.on{color:var(--cy);border-bottom:3px solid var(--cy);background:rgba(0,242,255,0.05);}

        #panels{flex:1;overflow-y:auto;padding:15px;}
        .pnl{display:none;} .pnl.on{display:block;}
        .card{background:var(--card);border:1px solid var(--bor);border-radius:15px;padding:15px;margin-bottom:15px;position:relative;}
        
        /* Box de Visualização */
        .pvw-box{width:100%;aspect-ratio:16/9;background:#000;border-radius:12px;overflow:hidden;border:1px solid var(--bor);position:relative;display:flex;align-items:center;justify-content:center;}
        video, canvas {width:100%;height:100%;object-fit:contain;}
        
        /* Controles de sobreposição */
        .v-tools{position:absolute;bottom:10px;right:10px;display:flex;gap:8px;z-index:20;}
        .v-btn{background:rgba(0,0,0,0.75);border:1px solid rgba(255,255,255,0.2);color:#fff;width:42px;height:42px;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:20px;transition:0.2s;}
        .v-btn:active{transform:scale(0.9);background:var(--bl);}
        .v-btn.rec-active{color:var(--rd);box-shadow:0 0 15px var(--rd);border-color:var(--rd);}

        .btn{padding:14px;border:none;border-radius:10px;font-weight:900;cursor:pointer;font-size:11px;text-transform:uppercase;transition:0.3s;display:flex;align-items:center;justify-content:center;gap:8px;}
        .btn-cy{background:var(--bl);color:#fff;box-shadow:0 4px 15px rgba(0,102,255,0.3);}
        .btn-gr{background:var(--gr);color:#000;}
        .btn-rd{background:var(--rd);color:#fff;}
        
        .inp{width:100%;padding:15px;background:#000;border:1px solid var(--bor);border-radius:10px;color:var(--cy);margin-top:10px;font-family:'Share Tech Mono',monospace;text-align:center;font-size:18px;outline:none;}
        .inp:focus{border-color:var(--cy);}

        .slog{background:rgba(0,0,0,0.4);padding:10px;font-family:'Share Tech Mono';font-size:11px;color:#64748b;margin-top:10px;border-radius:8px;border-left:3px solid var(--bl);}
    </style>
</head>
<body>
<div id="app">
    <div id="hdr">
        <div style="font-weight:900; font-size:20px; color:var(--cy); letter-spacing:-1px;">SCREEN TV</div>
        <div class="id-panel" onclick="copyId()">
            <div id="my-id" style="font-family:'Share Tech Mono'; font-size:18px; color:#fff;">...</div>
        </div>
    </div>

    <div id="tabs">
        <div class="tab on" id="t-send" onclick="openTab('p-send')">Transmitir</div>
        <div class="tab" id="t-receive" onclick="openTab('p-receive')">Receber</div>
    </div>

    <div id="panels">
        <div class="pnl on" id="p-send">
            <div class="card" id="localArea">
                <div class="pvw-box">
                    <video id="localVideo" autoplay playsinline muted></video>
                    <canvas id="photoCanvas" style="display:none"></canvas>
                    
                    <div class="v-tools">
                        <button class="v-btn" onclick="toggleFS('localArea')" title="Tela Cheia">⛶</button>
                    </div>
                </div>
                <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:15px;">
                    <button class="btn btn-cy" onclick="startCapture()">📷 Câmera</button>
                    <button class="btn btn-gr" onclick="document.getElementById('fileInp').click()">🖼️ Galeria</button>
                </div>
                <input type="file" id="fileInp" hidden accept="image/*,video/*" onchange="handleFile(event)">
            </div>
            
            <div class="card">
                <input type="number" id="remoteID" class="inp" placeholder="ID DO DESTINO">
                <button class="btn btn-cy" style="width:100%; margin-top:15px; height:55px;" onclick="connectToPeer()">🚀 INICIAR CONEXÃO</button>
                <div id="sysLog" class="slog">> Sistema pronto para transmissão.</div>
            </div>
        </div>

        <div class="pnl" id="p-receive">
            <div class="card" id="remoteArea">
                <div class="pvw-box">
                    <video id="remoteVideo" autoplay playsinline></video>
                    <div class="v-tools">
                        <button id="btnRec" class="v-btn" onclick="toggleRecord()" title="Gravar">●</button>
                        <button class="v-btn" onclick="toggleFS('remoteArea')" title="Tela Cheia">⛶</button>
                    </div>
                </div>
                <button class="btn btn-rd" style="width:100%; margin-top:15px; height:55px;" onclick="location.reload()">🛑 ENCERRAR TUDO</button>
                <div id="recLog" class="slog">> Aguardando sinal remoto...</div>
            </div>
        </div>
    </div>
</div>

<script>
const firebaseConfig = { apiKey: "AIzaZtnv4FdBRJg86c3ISVIHojdQOb92L891sa3", databaseURL: "https://screentv-p2p-default-rtdb.firebaseio.com" };
firebase.initializeApp(firebaseConfig);

let peer, myId, localStream, remoteStream, mediaRecorder, chunks = [];

async function init() {
    myId = localStorage.getItem('screentv_id') || Math.floor(100000 + Math.random() * 900000).toString();
    localStorage.setItem('screentv_id', myId);
    document.getElementById('my-id').innerText = myId;

    peer = new Peer(myId, { config: { 'iceServers': [{ 'urls': 'stun:stun.l.google.com:19302' }] }});
    
    peer.on('call', call => {
        call.answer();
        call.on('stream', s => { 
            remoteStream = s;
            document.getElementById('remoteVideo').srcObject = s; 
            openTab('p-receive'); 
            document.getElementById('recLog').innerText = "> Sinal recebido em tempo real!";
        });
    });
}

// --- TELA CHEIA (Fullscreen) ---
function toggleFS(elementId) {
    const el = document.getElementById(elementId);
    if (!document.fullscreenElement) {
        if (el.requestFullscreen) el.requestFullscreen();
        else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();
        else if (el.msRequestFullscreen) el.msRequestFullscreen();
    } else {
        document.exitFullscreen();
    }
}

// --- GRAVAÇÃO (No Receptor) ---
function toggleRecord() {
    if (!remoteStream) return alert("Não há sinal para gravar!");
    const btn = document.getElementById('btnRec');

    if (mediaRecorder && mediaRecorder.state === "recording") {
        mediaRecorder.stop();
        btn.classList.remove('rec-active');
    } else {
        chunks = [];
        mediaRecorder = new MediaRecorder(remoteStream);
        mediaRecorder.ondataavailable = e => chunks.push(e.data);
        mediaRecorder.onstop = () => {
            const blob = new Blob(chunks, { type: 'video/webm' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `ScreenTV_Capture_${Date.now()}.webm`;
            a.click();
        };
        mediaRecorder.start();
        btn.classList.add('rec-active');
    }
}

// --- CAPTURA DE MÍDIA ---
async function startCapture() {
    try {
        if(localStream) localStream.getTracks().forEach(t => t.stop());
        localStream = await navigator.mediaDevices.getUserMedia({ video: { width: 1280, height: 720 }, audio: true });
        const v = document.getElementById('localVideo');
        v.srcObject = localStream;
        v.style.display = "block";
        document.getElementById('photoCanvas').style.display = "none";
        log("Câmera ativa.");
    } catch (e) { alert("Permissão de câmera negada."); }
}

function handleFile(event) {
    const file = event.target.files[0];
    if(!file) return;
    const v = document.getElementById('localVideo');
    const canvas = document.getElementById('photoCanvas');
    const url = URL.createObjectURL(file);

    if(file.type.startsWith('video')) {
        v.src = url; v.play();
        v.style.display = "block"; canvas.style.display = "none";
        setTimeout(() => { 
            localStream = v.captureStream ? v.captureStream(30) : v.mozCaptureStream(30); 
        }, 500);
    } else {
        const img = new Image();
        img.onload = () => {
            const ctx = canvas.getContext('2d');
            canvas.width = 1280; canvas.height = 720;
            ctx.drawImage(img, 0, 0, 1280, 720);
            v.style.display = "none"; canvas.style.display = "block";
            localStream = canvas.captureStream(1);
        };
        img.src = url;
    }
    log("Arquivo de galeria pronto.");
}

// --- CONEXÃO ---
function connectToPeer() {
    const id = document.getElementById('remoteID').value;
    if(!id || !localStream) return alert("Selecione a mídia (Câmera ou Galeria) e insira o ID!");
    peer.call(id, localStream);
    log("Transmitindo para " + id + "...");
}

// --- INTERFACE ---
function openTab(id) {
    document.querySelectorAll('.pnl, .tab').forEach(e => e.classList.remove('on'));
    document.getElementById(id).classList.add('on');
    const tId = "t-" + id.split('-')[1];
    document.getElementById(tId).classList.add('on');
}

function log(m) { document.getElementById('sysLog').innerText = "> " + m; }
function copyId() { navigator.clipboard.writeText(myId); alert("Seu ID foi copiado!"); }

window.onload = init;
</script>
</body>
</html>
