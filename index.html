<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>Screen TV - Full Stream</title>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg:#06080f; --sur:#0c1220; --card:#101828; --bor:#1c2f50;
            --cy:#00e5ff; --bl:#0057ff; --gr:#00ff9d; --rd:#ff2d55;
            --tx:#b8d0f0; --tx2:#5a7aa8; --wh:#e8f4ff;
        }
        *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
        body{background:var(--bg);font-family:'Exo 2',sans-serif;color:var(--tx);height:100vh;overflow:hidden;}
        #app{display:flex;flex-direction:column;height:100vh;max-width:800px;margin:0 auto;}
        
        #hdr{display:flex;align-items:center;justify-content:space-between;padding:0 20px;height:70px;border-bottom:1px solid var(--bor);background:rgba(6,8,15,0.95);}
        .id-panel{background:var(--card);border:1px solid var(--cy);border-radius:10px;padding:8px 15px;cursor:pointer;}
        .id-label{font-size:9px;color:var(--cy);font-weight:700;}
        .id-val{font-family:'Share Tech Mono',monospace;font-size:18px;color:#fff;}

        #tabs{display:flex;background:#0a0f1d;}
        .tab{flex:1;padding:15px;text-align:center;cursor:pointer;font-weight:700;color:var(--tx2);font-size:13px;}
        .tab.on{color:var(--cy);border-bottom:3px solid var(--cy);background:rgba(0,229,255,0.05);}

        #panels{flex:1;overflow-y:auto;padding:15px;}
        .pnl{display:none;} .pnl.on{display:block;}

        .card{background:var(--card);border:1px solid var(--bor);border-radius:15px;padding:15px;margin-bottom:15px;}
        .pvw{width:100%;aspect-ratio:16/9;background:#000;border-radius:10px;overflow:hidden;border:1px solid var(--bor);display:flex;align-items:center;justify-content:center;position:relative;}
        
        /* Media Elements */
        #localVideo, #remoteVideo {width:100%;height:100%;object-fit:contain;background:#000;}
        #localImg {max-width:100%; max-height:100%; object-fit:contain; display:none;}

        .mctrl{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:12px;}
        .btn{padding:12px;border:none;border-radius:8px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;font-size:12px;}
        .btn-cy{background:var(--bl);color:#fff;}
        .btn-gh{background:var(--sur);border:1px solid var(--bor);color:var(--tx);}
        .btn-rd{background:rgba(255,45,85,0.1);border:1px solid var(--rd);color:var(--rd);}
        
        .inp{width:100%;padding:12px;background:#000;border:1px solid var(--bor);border-radius:8px;color:var(--cy);margin-top:5px;font-family:'Share Tech Mono',monospace;}
        .slog{background:#000;padding:10px;height:60px;overflow-y:auto;font-family:'Share Tech Mono',monospace;font-size:11px;border-radius:8px;color:var(--tx2);margin-top:10px;border:1px solid var(--bor);}
    </style>
</head>
<body>
<div id="app">
    <div id="hdr">
        <div class="logo-tx" style="font-weight:900; font-size:20px;">SCREEN TV</div>
        <div class="id-panel" onclick="copyId()">
            <div class="id-label">MEU ID ÚNICO</div>
            <div id="my-id" class="id-val">...</div>
        </div>
    </div>

    <div id="tabs">
        <div class="tab on" data-target="p-send">TRANSMITIR</div>
        <div class="tab" data-target="p-receive">RECEBER</div>
        <div class="tab" data-target="p-agenda">AGENDA</div>
    </div>

    <div id="panels">
        <div class="pnl on" id="p-send">
            <div class="card">
                <div class="pvw">
                    <video id="localVideo" autoplay playsinline muted></video>
                    <img id="localImg">
                    <div id="localOvl" style="position:absolute; color:var(--tx2); font-size:12px;">SEM SINAL ATIVO</div>
                </div>
                <div class="mctrl">
                    <button class="btn btn-cy" onclick="startCapture('screen')">📱 Transmitir Tela</button>
                    <button class="btn btn-cy" onclick="startCapture('camera')">📷 Câmera</button>
                    <button class="btn btn-gh" onclick="document.getElementById('fileInp').click()">🖼️ Galeria (Vídeo/Foto)</button>
                    <button class="btn btn-rd" onclick="stopAll()">🛑 Resetar</button>
                </div>
                <input type="file" id="fileInp" hidden accept="image/*,video/*" onchange="handleFile(event)">
            </div>

            <div class="card">
                <input type="text" id="targetName" class="inp" placeholder="NOME DO DISPOSITIVO">
                <input type="text" id="remoteID" class="inp" placeholder="DIGITE O ID DO RECEPTOR">
                <button class="btn btn-cy" style="width:100%; margin-top:10px; height:50px; font-size:16px;" onclick="connectToPeer()">CONECTAR AGORA</button>
            </div>
        </div>

        <div class="pnl" id="p-receive">
            <div class="card">
                <div class="pvw">
                    <video id="remoteVideo" autoplay playsinline></video>
                    <div id="remoteOvl" style="position:absolute;">⌛ AGUARDANDO TRANSMISSÃO...</div>
                </div>
            </div>
        </div>

        <div class="pnl" id="p-agenda">
            <div class="card"><div class="id-label">DISPOSITIVOS SALVOS</div><div id="agendaItems"></div></div>
        </div>

        <div class="slog" id="sysLog">> Sistema pronto.</div>
    </div>
</div>

<script>
// --- FIREBASE (DATABASE) ---
const firebaseConfig = { apiKey: "AIzaZtnv4FdBRJg86c3ISVIHojdQOb92L891sa3", databaseURL: "https://screentv-p2p-default-rtdb.firebaseio.com" };
firebase.initializeApp(firebaseConfig);

let peer, myId, localStream, currentCall;

function initPeer() {
    myId = localStorage.getItem('screentv_persistent_id') || Math.floor(100000 + Math.random() * 900000).toString();
    localStorage.setItem('screentv_persistent_id', myId);
    document.getElementById('my-id').innerText = myId;

    peer = new Peer(myId, { 
        config: {'iceServers': [{ 'urls': 'stun:stun.l.google.com:19302' }]},
        debug: 1 
    });
    
    peer.on('open', () => log("Sua TV está online!", "var(--gr)"));

    peer.on('call', call => {
        log("Recebendo sinal...");
        call.answer();
        call.on('stream', stream => {
            const rv = document.getElementById('remoteVideo');
            rv.srcObject = stream;
            rv.style.display = "block";
            document.getElementById('remoteOvl').style.display = "none";
        });
        currentCall = call;
    });
}

// --- FUNÇÕES DE MÍDIA ---
async function startCapture(type) {
    try {
        if(localStream) localStream.getTracks().forEach(t => t.stop());
        
        if(type === 'screen') {
            // Captura de Tela (Mobile exige interação direta)
            localStream = await navigator.mediaDevices.getDisplayMedia({ video: true, audio: true });
        } else {
            // Câmera
            localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
        }
        
        showLocalMedia('video', localStream);
        updateActiveStream();
        log("Transmitindo " + (type === 'screen' ? "Tela" : "Câmera"));
    } catch (e) { log("Erro de permissão: " + e.message, "var(--rd)"); }
}

function handleFile(event) {
    const file = event.target.files[0];
    if(!file) return;

    const url = URL.createObjectURL(file);
    const v = document.getElementById('localVideo');
    const img = document.getElementById('localImg');

    if(file.type.startsWith('video')) {
        v.srcObject = null;
        v.src = url;
        v.play();
        showLocalMedia('video');
        // Captura o stream do vídeo que está tocando
        setTimeout(() => {
            localStream = v.captureStream ? v.captureStream() : v.mozCaptureStream();
            updateActiveStream();
        }, 500);
    } else {
        img.src = url;
        showLocalMedia('image');
        log("Foto carregada. (Para fotos, use o modo 'Tela' para o receptor ver)");
    }
}

function showLocalMedia(type, stream = null) {
    const v = document.getElementById('localVideo');
    const i = document.getElementById('localImg');
    const o = document.getElementById('localOvl');
    o.style.display = "none";
    
    if(type === 'video') {
        v.style.display = "block"; i.style.display = "none";
        if(stream) v.srcObject = stream;
    } else {
        v.style.display = "none"; i.style.display = "block";
    }
}

// --- CONEXÃO ---
function connectToPeer(target = null) {
    const id = target || document.getElementById('remoteID').value;
    if(!id) return alert("Insira o ID de destino!");
    if(!localStream) return alert("Ative a Tela ou Câmera primeiro!");

    log("Conectando...");
    currentCall = peer.call(id, localStream);
    
    currentCall.on('error', e => log("Erro na conexão", "var(--rd)"));
    
    if(!target) saveAgenda(id);
}

function updateActiveStream() {
    if(currentCall && currentCall.peerConnection && localStream) {
        const videoTrack = localStream.getVideoTracks()[0];
        const sender = currentCall.peerConnection.getSenders().find(s => s.track.kind === 'video');
        if(sender) sender.replaceTrack(videoTrack);
    }
}

// --- AGENDA E LOGS ---
function saveAgenda(id) {
    let name = document.getElementById('targetName').value || "Dispositivo";
    let agenda = JSON.parse(localStorage.getItem('screentv_agenda') || '[]');
    if(!agenda.find(a => a.id === id)) {
        agenda.push({id, name});
        localStorage.setItem('screentv_agenda', JSON.stringify(agenda));
        renderAgenda();
    }
}

function renderAgenda() {
    const cont = document.getElementById('agendaItems');
    const agenda = JSON.parse(localStorage.getItem('screentv_agenda') || '[]');
    cont.innerHTML = agenda.length ? "" : "<small>Nenhum salvo.</small>";
    agenda.forEach(a => {
        cont.innerHTML += `<div style="background:var(--sur); padding:12px; margin-top:8px; border-radius:10px; display:flex; justify-content:space-between; align-items:center; border:1px solid var(--bor)">
            <span><b>${a.name}</b><br><small style="color:var(--cy)">${a.id}</small></span>
            <button class="btn btn-cy" style="padding:8px 15px" onclick="connectToPeer('${a.id}')">LIGAR</button>
        </div>`;
    });
}

function log(m, c="") {
    const s = document.getElementById('sysLog');
    s.innerHTML += `<div style="color:${c}">> ${m}</div>`;
    s.scrollTop = s.scrollHeight;
}

function stopAll() { location.reload(); }

function copyId() {
    navigator.clipboard.writeText(myId);
    alert("Seu ID foi copiado!");
}

document.querySelectorAll('.tab').forEach(t => {
    t.onclick = () => {
        document.querySelectorAll('.tab, .pnl').forEach(e => e.classList.remove('on'));
        t.classList.add('on');
        document.getElementById(t.dataset.target).classList.add('on');
    }
});

window.onload = () => { initPeer(); renderAgenda(); };
</script>
</body>
</html>
