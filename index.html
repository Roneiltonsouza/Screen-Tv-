<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>SCREEN TV - FAST & AUTO</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">

    <style>
        :root { --bg:#05070a; --sur:#0a1220; --card:#0f172a; --bor:#1e293b; --cy:#00f2ff; --bl:#0066ff; --gr:#00ff88; --rd:#ff3366; --tx:#cbd5e1; }
        *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
        body{background:var(--bg);font-family:'Exo 2',sans-serif;color:var(--tx);height:100vh;overflow:hidden;}
        #app{display:flex;flex-direction:column;height:100vh;max-width:500px;margin:0 auto;}
        
        #hdr{display:flex;align-items:center;justify-content:space-between;padding:0 15px;height:65px;border-bottom:1px solid var(--bor);background:var(--bg);}
        .id-panel{background:var(--card);border:1px solid var(--cy);border-radius:8px;padding:5px 12px;cursor:pointer;}
        .id-val{font-family:'Share Tech Mono',monospace;font-size:19px;color:#fff;text-shadow:0 0 5px var(--cy);}

        #tabs{display:flex;background:#080c14;}
        .tab{flex:1;padding:15px;text-align:center;cursor:pointer;font-weight:700;color:#475569;font-size:11px;text-transform:uppercase;}
        .tab.on{color:var(--cy);border-bottom:3px solid var(--cy);background:rgba(0,242,255,0.05);}

        #panels{flex:1;overflow-y:auto;padding:12px;}
        .pnl{display:none;} .pnl.on{display:block;}
        .card{background:var(--card);border:1px solid var(--bor);border-radius:12px;padding:12px;margin-bottom:12px;position:relative;}
        
        .pvw-box{width:100%;aspect-ratio:16/9;background:#000;border-radius:10px;overflow:hidden;border:1px solid var(--bor);position:relative;}
        video, canvas {width:100%;height:100%;object-fit:contain;background:#000;}
        
        .v-tools{position:absolute;bottom:8px;right:8px;display:flex;gap:5px;}
        .v-btn{background:rgba(0,0,0,0.8);border:1px solid var(--bor);color:#fff;width:35px;height:35px;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;}

        .mctrl{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px;}
        .btn{padding:10px;border:none;border-radius:6px;font-weight:700;cursor:pointer;font-size:11px;transition:0.2s;}
        .btn-cy{background:var(--bl);color:#fff;}
        .btn-gh{background:var(--sur);border:1px solid var(--bor);color:var(--tx);}
        .btn-rd{background:rgba(255,51,102,0.1);border:1px solid var(--rd);color:var(--rd);}
        .btn:active{transform:scale(0.95);}
        
        .inp{width:100%;padding:10px;background:#000;border:1px solid var(--bor);border-radius:6px;color:var(--cy);margin-top:5px;font-family:'Share Tech Mono',monospace;text-align:center;}
        
        /* Agenda Otimizada */
        .agenda-item{background:rgba(255,255,255,0.03);padding:10px;border-radius:8px;margin-bottom:6px;display:flex;justify-content:space-between;align-items:center;border-left:3px solid var(--cy);}
        .agenda-info b{font-size:13px;display:block;}
        .agenda-info small{color:var(--cy);font-family:'Share Tech Mono';}

        .recording-dot{width:10px;height:10px;background:var(--rd);border-radius:50%;position:absolute;top:10px;left:10px;display:none;animation:pulse 1s infinite;}
        @keyframes pulse { 0%{opacity:1;} 50%{opacity:0.3;} 100%{opacity:1;} }
        .slog{background:#000;padding:8px;height:45px;overflow-y:auto;font-family:'Share Tech Mono',monospace;font-size:10px;border-radius:6px;color:#475569;margin-top:8px;border:1px solid var(--bor);}
    </style>
</head>
<body>
<div id="app">
    <div id="hdr">
        <div style="font-weight:900; font-size:18px; letter-spacing:1px;">SCREEN <span style="color:var(--cy)">TV</span></div>
        <div class="id-panel" onclick="copyId()">
            <div id="my-id" class="id-val">...</div>
        </div>
    </div>

    <div id="tabs">
        <div class="tab on" data-target="p-send">Transmitir</div>
        <div class="tab" data-target="p-receive">Receber</div>
        <div class="tab" data-target="p-agenda">Agenda</div>
    </div>

    <div id="panels">
        <div class="pnl on" id="p-send">
            <div class="card">
                <div class="pvw-box" id="localBox">
                    <video id="localVideo" autoplay playsinline muted></video>
                    <canvas id="photoCanvas" style="display:none"></canvas>
                    <div class="v-tools"><button class="v-btn" onclick="toggleFS('localBox')">⛶</button></div>
                </div>
                <div class="mctrl">
                    <button class="btn btn-cy" onclick="startCapture('screen')">📱 Tela</button>
                    <button class="btn btn-cy" onclick="startCapture('camera')">📷 Câmera</button>
                    <button class="btn btn-gh" onclick="document.getElementById('fileInp').click()">🖼️ Galeria</button>
                    <button class="btn btn-rd" onclick="location.reload()">🛑 Sair</button>
                </div>
                <input type="file" id="fileInp" hidden accept="image/*,video/*" onchange="handleFile(event)">
            </div>
            <div class="card">
                <input type="text" id="targetName" class="inp" placeholder="NOME DO DISPOSITIVO">
                <input type="text" id="remoteID" class="inp" placeholder="ID DO DESTINO">
                <button class="btn btn-cy" style="width:100%; margin-top:10px; height:45px; font-size:14px;" onclick="connectToPeer()">⚡ CONECTAR AGORA</button>
            </div>
        </div>

        <div class="pnl" id="p-receive">
            <div class="card">
                <div class="pvw-box" id="remoteBox">
                    <div id="recDot" class="recording-dot"></div>
                    <video id="remoteVideo" autoplay playsinline></video>
                    <div class="v-tools">
                        <button id="recBtn" class="v-btn" onclick="toggleRecord()" style="color:var(--rd)">●</button>
                        <button class="v-btn" onclick="toggleFS('remoteBox')">⛶</button>
                    </div>
                </div>
                <div id="sysLog" class="slog">> Pronto para receber em alta velocidade.</div>
            </div>
        </div>

        <div class="pnl" id="p-agenda">
            <div class="card">
                <div style="font-size:10px; color:var(--cy); margin-bottom:10px; font-weight:700;">SALVOS AUTOMATICAMENTE</div>
                <div id="agendaItems"></div>
            </div>
        </div>
    </div>
</div>

<script>
// --- FIREBASE API ---
const firebaseConfig = { apiKey: "AIzaZtnv4FdBRJg86c3ISVIHojdQOb92L891sa3", databaseURL: "https://screentv-p2p-default-rtdb.firebaseio.com" };
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let peer, myId, localStream, remoteStream, mediaRecorder, recordedChunks = [];

// --- CONFIGURAÇÃO DE VELOCIDADE (ULTRA LOW LATENCY) ---
const FAST_CONFIG = {
    video: {
        width: { max: 854 }, // Reduzi de 1280 para 854 (480p Pro) - elimina o lag no celular
        height: { max: 480 },
        frameRate: { max: 20 } // 20fps é o ideal para fluidez sem engasgar
    },
    audio: true
};

async function setupApp() {
    myId = localStorage.getItem('screentv_id') || Math.floor(100000 + Math.random() * 900000).toString();
    localStorage.setItem('screentv_id', myId);
    document.getElementById('my-id').innerText = myId;

    // Sincroniza Agenda da Nuvem
    db.ref('users/' + myId + '/agenda').on('value', snap => renderAgenda(snap.val()));

    initPeer(myId);
}

function initPeer(id) {
    peer = new Peer(id, { 
        config: { 'iceServers': [{ 'urls': 'stun:stun.l.google.com:19302' }] },
        debug: 1 
    });
    peer.on('call', call => {
        call.answer();
        call.on('stream', s => {
            remoteStream = s;
            document.getElementById('remoteVideo').srcObject = s;
        });
    });
}

// --- MÍDIA ---
async function startCapture(type) {
    try {
        if(localStream) localStream.getTracks().forEach(t => t.stop());
        localStream = (type === 'screen') 
            ? await navigator.mediaDevices.getDisplayMedia({ video: true, audio: true })
            : await navigator.mediaDevices.getUserMedia(FAST_CONFIG);
        document.getElementById('localVideo').srcObject = localStream;
        log("Sinal ativo.");
    } catch (e) { log("Erro de mídia."); }
}

function handleFile(event) {
    const file = event.target.files[0];
    if(!file) return;
    const v = document.getElementById('localVideo');
    const canvas = document.getElementById('photoCanvas');
    if(file.type.startsWith('video')) {
        v.src = URL.createObjectURL(file); v.play();
        v.style.display = "block"; canvas.style.display = "none";
        setTimeout(() => { localStream = v.captureStream(20); }, 500);
    } else {
        const img = new Image();
        img.onload = () => {
            const ctx = canvas.getContext('2d');
            canvas.width = 854; canvas.height = 480;
            ctx.drawImage(img, 0, 0, 854, 480);
            v.style.display = "none"; canvas.style.display = "block";
            localStream = canvas.captureStream(1);
        };
        img.src = URL.createObjectURL(file);
    }
}

// --- CONEXÃO E SALVAMENTO AUTOMÁTICO ---
function connectToPeer(target = null) {
    const id = target || document.getElementById('remoteID').value;
    const name = document.getElementById('targetName').value || ("TV-" + id);
    
    if(!id || !localStream) return alert("Ative a mídia e coloque o ID!");
    
    peer.call(id, localStream);
    
    // SALVA AUTOMÁTICO NA AGENDA (API)
    db.ref('users/' + myId + '/agenda/' + id).update({ id: id, name: name });
    log("Conectando a " + id);
}

function renderAgenda(data) {
    const cont = document.getElementById('agendaItems');
    cont.innerHTML = data ? "" : "<div style='font-size:11px; opacity:0.5'>Nenhum ID salvo ainda.</div>";
    if(!data) return;

    Object.values(data).forEach(a => {
        cont.innerHTML += `<div class="agenda-item">
            <div class="agenda-info"><b>${a.name}</b><small>${a.id}</small></div>
            <div style="display:flex; gap:5px">
                <button class="btn btn-cy" style="padding:5px 12px" onclick="connectToPeer('${a.id}')">CONECTAR</button>
                <button class="btn btn-rd" style="padding:5px 8px" onclick="deleteItem('${a.id}')">X</button>
            </div>
        </div>`;
    });
}

function deleteItem(id) { if(confirm("Remover da agenda?")) db.ref('users/' + myId + '/agenda/' + id).remove(); }

// --- UTILITÁRIOS ---
function toggleRecord() {
    if(!remoteStream) return;
    const btn = document.getElementById('recBtn');
    const dot = document.getElementById('recDot');
    if (mediaRecorder && mediaRecorder.state === "recording") {
        mediaRecorder.stop();
        btn.innerHTML = "●"; dot.style.display = "none";
    } else {
        recordedChunks = [];
        mediaRecorder = new MediaRecorder(remoteStream);
        mediaRecorder.ondataavailable = e => recordedChunks.push(e.data);
        mediaRecorder.onstop = () => {
            const blob = new Blob(recordedChunks, { type: "video/webm" });
            const a = document.createElement("a");
            a.href = URL.createObjectURL(blob);
            a.download = `Rec_${Date.now()}.webm`;
            a.click();
        };
        mediaRecorder.start();
        btn.innerHTML = "■"; dot.style.display = "block";
    }
}

function toggleFS(id) {
    const el = document.getElementById(id);
    if (!document.fullscreenElement) el.requestFullscreen().catch(e => {});
    else document.exitFullscreen();
}

function log(m) { document.getElementById('sysLog').innerHTML = "> " + m; }
function copyId() { navigator.clipboard.writeText(myId); alert("Seu ID Copiado!"); }

document.querySelectorAll('.tab').forEach(t => {
    t.onclick = () => {
        document.querySelectorAll('.tab, .pnl').forEach(e => e.classList.remove('on'));
        t.classList.add('on'); document.getElementById(t.dataset.target).classList.add('on');
    }
});

window.onload = setupApp;
</script>
</body>
</html>
