<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>SCREEN TV - IPTV PRO</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">

    <style>
        :root { --bg:#05070a; --card:#0f172a; --bor:#1e293b; --cy:#00f2ff; --bl:#0066ff; --gr:#00ff88; --rd:#ff3366; --tx:#cbd5e1; }
        *{box-sizing:border-box;margin:0;padding:0;}
        body{background:var(--bg);font-family:'Exo 2',sans-serif;color:var(--tx);height:100vh;overflow:hidden;}
        #app{display:flex;flex-direction:column;height:100vh;max-width:500px;margin:0 auto;}
        
        #hdr{display:flex;align-items:center;justify-content:space-between;padding:0 15px;height:60px;border-bottom:1px solid var(--bor);}
        .id-panel{background:var(--card);border:1px solid var(--cy);border-radius:8px;padding:5px 12px;cursor:pointer;}
        
        #tabs{display:flex;background:#080c14;border-bottom:1px solid var(--bor);}
        .tab{flex:1;padding:15px;text-align:center;cursor:pointer;font-weight:700;color:#475569;font-size:10px;text-transform:uppercase;}
        .tab.on{color:var(--cy);border-bottom:3px solid var(--cy);background:rgba(0,242,255,0.05);}

        #panels{flex:1;overflow-y:auto;padding:12px;}
        .pnl{display:none;} .pnl.on{display:block;}
        .card{background:var(--card);border:1px solid var(--bor);border-radius:12px;padding:12px;margin-bottom:12px;position:relative;}
        
        .pvw-box{width:100%;aspect-ratio:16/9;background:#000;border-radius:10px;overflow:hidden;border:1px solid var(--bor);position:relative;}
        video{width:100%;height:100%;object-fit:contain;}
        
        .v-tools{position:absolute;bottom:8px;right:8px;display:flex;gap:5px;z-index:10;}
        .v-btn{background:rgba(0,0,0,0.8);border:1px solid var(--bor);color:#fff;width:38px;height:38px;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;}
        .v-btn.rec-on{color:var(--rd);box-shadow:0 0 10px var(--rd);border-color:var(--rd);}

        .btn{padding:12px;border:none;border-radius:8px;font-weight:700;cursor:pointer;font-size:11px;text-transform:uppercase;}
        .btn-cy{background:var(--bl);color:#fff;}
        .btn-gr{background:var(--gr);color:#000;}
        .btn-rd{background:var(--rd);color:#fff;}
        
        .inp{width:100%;padding:12px;background:#000;border:1px solid var(--bor);border-radius:8px;color:var(--cy);margin-top:8px;font-family:'Share Tech Mono';text-align:center;}
        
        /* Lista IPTV Estilizada */
        .iptv-list-cont{margin-top:10px;max-height:300px;overflow-y:auto;}
        .iptv-item{background:rgba(255,255,255,0.03);padding:12px;border-radius:8px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center;border-left:4px solid var(--gr);}
        .iptv-info{flex:1;cursor:pointer;}
        .iptv-info b{font-size:14px;display:block;color:#fff;}
        .iptv-info small{font-size:10px;color:var(--gr);text-transform:uppercase;}
        .iptv-actions{display:flex;gap:8px;}
        .mini-btn{padding:6px 10px;border-radius:6px;border:none;font-size:12px;cursor:pointer;background:var(--bor);color:#fff;}

        .slog{background:#000;padding:8px;font-family:'Share Tech Mono';font-size:10px;color:#475569;margin-top:10px;border-radius:5px;}
    </style>
</head>
<body>
<div id="app">
    <div id="hdr">
        <div style="font-weight:900; font-size:18px; color:var(--cy);">SCREEN TV</div>
        <div class="id-panel" onclick="copyId()"><div id="my-id" style="font-family:'Share Tech Mono';color:#fff">...</div></div>
    </div>

    <div id="tabs">
        <div class="tab on" id="t-iptv" onclick="openTab('p-iptv')">Canais</div>
        <div class="tab" id="t-send" onclick="openTab('p-send')">Transmitir</div>
        <div class="tab" id="t-receive" onclick="openTab('p-receive')">Receber</div>
    </div>

    <div id="panels">
        <div class="pnl on" id="p-iptv">
            <div class="card">
                <div style="font-size:11px;color:var(--gr);font-weight:900;margin-bottom:8px;">GERENCIAR LISTA M3U</div>
                <input type="text" id="iptvName" class="inp" placeholder="NOME DO CANAL">
                <input type="text" id="iptvURL" class="inp" placeholder="URL .M3U8">
                <button class="btn btn-gr" style="width:100%;margin-top:10px;" onclick="addIPTV()">➕ ADICIONAR CANAL</button>
            </div>
            <div id="iptvList" class="iptv-list-cont"></div>
        </div>

        <div class="pnl" id="p-send">
            <div class="card">
                <div class="pvw-box"><video id="localVideo" autoplay playsinline muted></video></div>
                <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px;">
                    <button class="btn btn-cy" onclick="startCapture()">📷 Câmera</button>
                    <button class="btn btn-cy" style="background:#475569" onclick="document.getElementById('fileInp').click()">🖼️ Galeria</button>
                </div>
                <input type="file" id="fileInp" hidden accept="image/*,video/*" onchange="handleFile(event)">
            </div>
            <div class="card">
                <input type="number" id="remoteID" class="inp" placeholder="ID DO DESTINO">
                <button class="btn btn-cy" style="width:100%;margin-top:10px;height:50px;" onclick="connectToPeer()">🚀 INICIAR TRANSMISSÃO</button>
                <div id="sysLog" class="slog">> Selecione um canal ou câmera.</div>
            </div>
        </div>

        <div class="pnl" id="p-receive">
            <div class="card" id="remoteArea">
                <div class="pvw-box">
                    <video id="remoteVideo" autoplay playsinline></video>
                    <div class="v-tools">
                        <button id="btnRec" class="v-btn" onclick="toggleRecord()" title="Gravar Sinal">●</button>
                        <button class="v-btn" onclick="toggleFS('remoteArea')">⛶</button>
                    </div>
                </div>
                <button class="btn btn-rd" style="width:100%;margin-top:10px;" onclick="location.reload()">🛑 DESCONECTAR</button>
            </div>
        </div>
    </div>
</div>

<script>
const firebaseConfig = { apiKey: "AIzaZtnv4FdBRJg86c3ISVIHojdQOb92L891sa3", databaseURL: "https://screentv-p2p-default-rtdb.firebaseio.com" };
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let peer, myId, localStream, remoteStream, mediaRecorder, chunks = [];

async function init() {
    myId = localStorage.getItem('screentv_id') || Math.floor(100000 + Math.random() * 900000).toString();
    localStorage.setItem('screentv_id', myId);
    document.getElementById('my-id').innerText = myId;

    peer = new Peer(myId, { config: { 'iceServers': [{ 'urls': 'stun:stun.l.google.com:19302' }] }});
    peer.on('call', call => {
        call.answer();
        call.on('stream', s => { 
            remoteStream = s;
            document.getElementById('remoteVideo').srcObject = s; 
            openTab('p-receive'); 
        });
    });

    loadIPTV();
}

// --- GESTÃO IPTV ---
function addIPTV() {
    const name = document.getElementById('iptvName').value;
    const url = document.getElementById('iptvURL').value;
    if(!name || !url) return alert("Preencha os campos!");

    const id = Date.now();
    db.ref('users/'+myId+'/iptv/'+id).set({ id, name, url });
    document.getElementById('iptvName').value = "";
    document.getElementById('iptvURL').value = "";
}

function loadIPTV() {
    db.ref('users/'+myId+'/iptv').on('value', snap => {
        const list = document.getElementById('iptvList');
        list.innerHTML = "";
        const data = snap.val();
        if(!data) {
            list.innerHTML = "<center style='opacity:0.4;font-size:12px;margin-top:20px;'>Lista vazia</center>";
            return;
        }
        Object.values(data).forEach(item => {
            list.innerHTML += `
                <div class="iptv-item">
                    <div class="iptv-info" onclick="playIPTV('${item.url}')">
                        <b>${item.name}</b>
                        <small>Toque para carregar</small>
                    </div>
                    <div class="iptv-actions">
                        <button class="mini-btn" onclick="editIPTV('${item.id}', '${item.name}')">✏️</button>
                        <button class="mini-btn" style="color:var(--rd)" onclick="delIPTV('${item.id}')">X</button>
                    </div>
                </div>`;
        });
    });
}

function playIPTV(url) {
    const v = document.getElementById('localVideo');
    v.src = url;
    v.play().then(() => {
        localStream = v.captureStream ? v.captureStream(24) : v.mozCaptureStream(24);
        log("Canal carregado! Vá em TRANSMITIR.");
        openTab('p-send');
    }).catch(() => alert("Erro: Este link pode estar offline ou bloqueado por CORS."));
}

function editIPTV(id, oldName) {
    const newName = prompt("Editar nome do canal:", oldName);
    if(newName) db.ref('users/'+myId+'/iptv/'+id).update({ name: newName });
}

function delIPTV(id) {
    if(confirm("Excluir canal da lista?")) db.ref('users/'+myId+'/iptv/'+id).remove();
}

// --- GRAVAÇÃO (RECEPTOR) ---
function toggleRecord() {
    if (!remoteStream) return;
    const btn = document.getElementById('btnRec');
    if (mediaRecorder && mediaRecorder.state === "recording") {
        mediaRecorder.stop();
        btn.classList.remove('rec-on');
    } else {
        chunks = [];
        mediaRecorder = new MediaRecorder(remoteStream);
        mediaRecorder.ondataavailable = e => chunks.push(e.data);
        mediaRecorder.onstop = () => {
            const blob = new Blob(chunks, { type: 'video/webm' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = `Sinal_TV_${Date.now()}.webm`;
            a.click();
        };
        mediaRecorder.start();
        btn.classList.add('rec-on');
    }
}

// --- MÍDIA ---
async function startCapture() {
    localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
    document.getElementById('localVideo').srcObject = localStream;
}

function handleFile(event) {
    const url = URL.createObjectURL(event.target.files[0]);
    const v = document.getElementById('localVideo');
    v.src = url; v.play();
    setTimeout(() => { localStream = v.captureStream(24); }, 500);
}

function connectToPeer() {
    const id = document.getElementById('remoteID').value;
    if(!id || !localStream) return alert("ID ou Mídia ausente!");
    peer.call(id, localStream);
    log("Transmitindo...");
}

function toggleFS(id) {
    const el = document.getElementById(id);
    if (!document.fullscreenElement) el.requestFullscreen();
    else document.exitFullscreen();
}

function openTab(id) {
    document.querySelectorAll('.pnl, .tab').forEach(e => e.classList.remove('on'));
    document.getElementById(id).classList.add('on');
    const tabId = "t-" + id.split('-')[1];
    document.getElementById(tabId).classList.add('on');
}

function log(m) { document.getElementById('sysLog').innerText = "> " + m; }
function copyId() { navigator.clipboard.writeText(myId); alert("ID Copiado!"); }

window.onload = init;
</script>
</body>
</html>
