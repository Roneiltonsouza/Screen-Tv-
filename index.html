<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>Screen TV - ID Único Firebase</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg:#06080f; --sur:#0c1220; --card:#101828; --bor:#1c2f50;
            --cy:#00e5ff; --bl:#0057ff; --gr:#00ff9d; --rd:#ff2d55;
            --tx:#b8d0f0; --tx2:#5a7aa8; --wh:#e8f4ff;
        }
        *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
        body{background:var(--bg);font-family:'Exo 2',sans-serif;color:var(--tx);height:100vh;overflow:hidden;}
        
        #app{display:flex;flex-direction:column;height:100vh;max-width:800px;margin:0 auto;position:relative;z-index:1;}
        
        #hdr{display:flex;align-items:center;justify-content:space-between;padding:0 20px;height:70px;border-bottom:1px solid var(--bor);background:rgba(6,8,15,0.95);}
        .id-panel{background:var(--card);border:1px solid var(--cy);border-radius:10px;padding:8px 15px;cursor:pointer;}
        .id-label{font-size:9px;color:var(--cy);letter-spacing:1px;font-weight:700;}
        .id-val{font-family:'Share Tech Mono',monospace;font-size:20px;color:#fff;letter-spacing:2px;}

        #tabs{display:flex;background:#0a0f1d;}
        .tab{flex:1;padding:15px;text-align:center;cursor:pointer;font-weight:700;color:var(--tx2);}
        .tab.on{color:var(--cy);border-bottom:3px solid var(--cy);background:rgba(0,229,255,0.05);}

        #panels{flex:1;overflow-y:auto;padding:15px;}
        .pnl{display:none;} .pnl.on{display:block;}

        .card{background:var(--card);border:1px solid var(--bor);border-radius:15px;padding:15px;margin-bottom:15px;}
        .pvw{width:100%;aspect-ratio:16/9;background:#000;border-radius:10px;overflow:hidden;border:1px solid var(--bor);display:flex;align-items:center;justify-content:center;position:relative;}
        video{width:100%;height:100%;object-fit:contain;}
        
        .mctrl{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:10px;}
        .btn{padding:12px;border:none;border-radius:8px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;}
        .btn-cy{background:var(--bl);color:#fff;}
        .btn-gh{background:var(--sur);border:1px solid var(--bor);color:var(--tx);}
        .btn-rd{background:rgba(255,45,85,0.1);border:1px solid var(--rd);color:var(--rd);}
        
        .connect-box{display:flex;flex-direction:column;gap:10px;margin-top:10px;}
        .inp{width:100%;padding:12px;background:#000;border:1px solid var(--bor);border-radius:8px;color:var(--cy);font-family:'Share Tech Mono',monospace;font-size:18px;text-align:center;}
        
        .agenda-list{margin-top:10px;display:flex;flex-direction:column;gap:8px;}
        .contact-item{background:var(--sur);padding:10px 15px;border-radius:8px;display:flex;justify-content:space-between;align-items:center;border:1px solid var(--bor);}
        .contact-id{font-family:'Share Tech Mono',monospace;color:var(--cy);font-size:14px;}

        .slog{background:#000;padding:10px;height:60px;overflow-y:auto;font-family:'Share Tech Mono',monospace;font-size:11px;border-radius:8px;color:var(--tx2);margin-top:10px;}
    </style>
</head>
<body>
<div id="app">
    <div id="hdr">
        <div class="logo-tx">SCREEN TV</div>
        <div class="id-panel" id="copyId">
            <div class="id-label">ID ÚNICO ATIVO</div>
            <div class="id-val" id="my-id">CARREGANDO...</div>
        </div>
    </div>

    <div id="tabs">
        <div class="tab on" data-target="p-send">TRANSMITIR</div>
        <div class="tab" data-target="p-receive">RECEBER</div>
        <div class="tab" data-target="p-agenda">AGENDA</div>
    </div>

    <div id="panels">
        <div class="pnl on" id="p-send">
            <div class="card">
                <div class="pvw">
                    <video id="localVideo" autoplay playsinline muted></video>
                    <div id="localOvl" style="position:absolute;">🎥 AGUARDANDO MÍDIA</div>
                </div>
                <div class="mctrl">
                    <button class="btn btn-cy" onclick="startCapture('screen')">📺 Tela</button>
                    <button class="btn btn-cy" onclick="startCapture('camera')">📷 Câmera</button>
                    <button class="btn btn-rd" onclick="stopAll()">🛑 Parar</button>
                </div>
            </div>

            <div class="card">
                <div class="id-label">CONECTAR NOVO DISPOSITIVO</div>
                <div class="connect-box">
                    <input type="text" id="targetName" class="inp" placeholder="NOME (EX: TV SALA)" style="font-size: 14px; height: 40px;">
                    <input type="text" id="remoteID" class="inp" placeholder="DIGITE O ID">
                    <button class="btn btn-cy" onclick="connectToPeer()">VINCULAR E CONECTAR</button>
                </div>
            </div>
        </div>

        <div class="pnl" id="p-receive">
            <div class="card">
                <div class="pvw">
                    <video id="remoteVideo" autoplay playsinline></video>
                    <div id="remoteOvl" style="position:absolute; text-align:center;">
                        <div class="id-val">PRONTO PARA RECEBER</div>
                    </div>
                </div>
            </div>
        </div>

        <div class="pnl" id="p-agenda">
            <div class="card">
                <div class="id-label">DISPOSITIVOS SALVOS</div>
                <div class="agenda-list" id="agendaItems"></div>
            </div>
        </div>

        <div class="slog" id="sysLog">> Inicializando Firebase...</div>
    </div>
</div>

<script>
// --- CONFIGURAÇÃO FIREBASE ---
const firebaseConfig = {
    apiKey: "AIzaZtnv4FdBRJg86c3ISVIHojdQOb92L891sa3",
    authDomain: "screentv-p2p.firebaseapp.com",
    databaseURL: "https://screentv-p2p-default-rtdb.firebaseio.com",
    projectId: "screentv-p2p",
    storageBucket: "screentv-p2p.appspot.com",
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let peer;
let myId = "";
let localStream;

// --- GERENCIAMENTO DE ID ÚNICO ---
async function setupIdentity() {
    let storedId = localStorage.getItem('screentv_persistent_id');
    
    if (!storedId) {
        // Se não tem ID, gera um novo de 6 dígitos
        storedId = Math.floor(100000 + Math.random() * 900000).toString();
        localStorage.setItem('screentv_persistent_id', storedId);
        
        // Registra no Firebase para garantir que esse ID pertence a este "usuário"
        db.ref('users/' + storedId).set({ status: 'online', lastSeen: Date.now() });
    }
    
    myId = storedId;
    document.getElementById('my-id').innerText = myId;
    initPeer(myId);
}

function initPeer(id) {
    peer = new Peer(id);

    peer.on('open', () => {
        log("Conectado ao Servidor com ID: " + id, "var(--gr)");
    });

    peer.on('call', (call) => {
        log("Recebendo sinal externo...");
        call.answer();
        call.on('stream', (remoteStream) => {
            document.getElementById('remoteVideo').srcObject = remoteStream;
            document.getElementById('remoteOvl').style.display = "none";
        });
    });

    peer.on('error', (err) => {
        if(err.type === 'unavailable-id') {
            log("ID em uso, tentando reconectar...", "var(--or)");
            // Se o ID estiver "preso", ele tenta forçar a entrada após 2 segundos
            setTimeout(() => location.reload(), 2000);
        }
    });
}

// --- TRANSMISSÃO E AGENDA ---
async function startCapture(type) {
    try {
        localStream = (type === 'screen') 
            ? await navigator.mediaDevices.getDisplayMedia({ video: true })
            : await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
        document.getElementById('localVideo').srcObject = localStream;
        document.getElementById('localOvl').style.display = "none";
        log("Fonte de mídia ativa.");
    } catch (e) { log("Erro: " + e.message, "var(--rd)"); }
}

function connectToPeer(targetId = null, name = null) {
    const id = targetId || document.getElementById('remoteID').value;
    const nick = name || document.getElementById('targetName').value || "Dispositivo";
    
    if (!id) return alert("Insira o ID!");
    if (!localStream) return alert("Ative a Tela ou Câmera antes!");

    log("Conectando a: " + nick);
    const call = peer.call(id, localStream);
    
    // Salva na Agenda do Firebase/Local
    saveToAgenda(id, nick);
}

function saveToAgenda(id, name) {
    let agenda = JSON.parse(localStorage.getItem('screentv_agenda') || '[]');
    if (!agenda.find(item => item.id === id)) {
        agenda.push({ id, name });
        localStorage.setItem('screentv_agenda', JSON.stringify(agenda));
        renderAgenda();
    }
}

function renderAgenda() {
    const container = document.getElementById('agendaItems');
    const agenda = JSON.parse(localStorage.getItem('screentv_agenda') || '[]');
    container.innerHTML = "";
    
    agenda.forEach(item => {
        const div = document.createElement('div');
        div.className = 'contact-item';
        div.innerHTML = `
            <div>
                <div style="font-weight:700; font-size:14px">${item.name}</div>
                <div class="contact-id">${item.id}</div>
            </div>
            <button class="btn btn-gh" style="padding:5px 12px" onclick="connectToPeer('${item.id}', '${item.name}')">LIGAR</button>
        `;
        container.appendChild(div);
    });
}

// --- UTILITÁRIOS ---
function log(msg, col = "") {
    const l = document.getElementById('sysLog');
    l.innerHTML += `<div style="color:${col}">> ${msg}</div>`;
    l.scrollTop = l.scrollHeight;
}

function stopAll() {
    if(localStream) localStream.getTracks().forEach(t => t.stop());
    document.getElementById('localVideo').srcObject = null;
    document.getElementById('localOvl').style.display = "flex";
}

document.querySelectorAll('.tab').forEach(tab => {
    tab.onclick = () => {
        document.querySelectorAll('.tab, .pnl').forEach(el => el.classList.remove('on'));
        tab.classList.add('on');
        document.getElementById(tab.dataset.target).classList.add('on');
    };
});

window.onload = () => {
    setupIdentity();
    renderAgenda();
};
</script>
</body>
    </html>
