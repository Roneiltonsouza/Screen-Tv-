<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>SCREEN TV - GALERIA & AUTO-SAVE</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">

    <style>
        :root { --bg:#05070a; --card:#0f172a; --bor:#1e293b; --cy:#00f2ff; --bl:#0066ff; --gr:#00ff88; --rd:#ff3366; --tx:#cbd5e1; }
        *{box-sizing:border-box;margin:0;padding:0;}
        body{background:var(--bg);font-family:'Exo 2',sans-serif;color:var(--tx);height:100vh;overflow:hidden;}
        #app{display:flex;flex-direction:column;height:100vh;max-width:500px;margin:0 auto;}
        
        #hdr{display:flex;align-items:center;justify-content:space-between;padding:0 15px;height:60px;border-bottom:1px solid var(--bor);}
        .id-panel{background:var(--card);border:1px solid var(--cy);border-radius:8px;padding:5px 12px;cursor:pointer;}
        .id-val{font-family:'Share Tech Mono',monospace;font-size:18px;color:#fff;}

        #tabs{display:flex;background:#080c14;}
        .tab{flex:1;padding:15px;text-align:center;cursor:pointer;font-weight:700;color:#475569;font-size:11px;}
        .tab.on{color:var(--cy);border-bottom:3px solid var(--cy);background:rgba(0,242,255,0.05);}

        #panels{flex:1;overflow-y:auto;padding:12px;}
        .pnl{display:none;} .pnl.on{display:block;}
        .card{background:var(--card);border:1px solid var(--bor);border-radius:12px;padding:12px;margin-bottom:12px;}
        
        .pvw-box{width:100%;aspect-ratio:16/9;background:#000;border-radius:10px;overflow:hidden;border:1px solid var(--bor);position:relative;display:flex;align-items:center;justify-content:center;}
        video, canvas {width:100%;height:100%;object-fit:contain;}
        
        .mctrl{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px;}
        .btn{padding:12px;border:none;border-radius:6px;font-weight:700;cursor:pointer;font-size:11px;text-transform:uppercase;}
        .btn-cy{background:var(--bl);color:#fff;}
        .btn-gh{background:var(--sur);border:1px solid var(--bor);color:var(--tx);}
        .btn-rd{background:var(--rd);color:#fff;}
        
        .inp{width:100%;padding:12px;background:#000;border:1px solid var(--bor);border-radius:6px;color:var(--cy);margin-top:8px;font-family:'Share Tech Mono',monospace;text-align:center;font-size:16px;}
        
        .agenda-item{background:rgba(255,255,255,0.03);padding:12px;border-radius:8px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center;border-left:4px solid var(--cy);}
        .agenda-info b{font-size:14px;display:block;color:#fff;}
        .agenda-info small{color:var(--cy);font-family:'Share Tech Mono';font-size:12px;}

        .slog{background:#000;padding:8px;height:40px;font-family:'Share Tech Mono';font-size:10px;color:#475569;margin-top:10px;border-radius:5px;}
    </style>
</head>
<body>
<div id="app">
    <div id="hdr">
        <div style="font-weight:900; font-size:18px; color:var(--cy);">SCREEN TV</div>
        <div class="id-panel" onclick="copyId()">
            <div id="my-id" class="id-val">...</div>
        </div>
    </div>

    <div id="tabs">
        <div class="tab on" id="t-send" onclick="openTab('p-send')">TRANSMITIR</div>
        <div class="tab" id="t-receive" onclick="openTab('p-receive')">RECEBER</div>
        <div class="tab" id="t-agenda" onclick="openTab('p-agenda')">AGENDA</div>
    </div>

    <div id="panels">
        <div class="pnl on" id="p-send">
            <div class="card">
                <div class="pvw-box">
                    <video id="localVideo" autoplay playsinline muted></video>
                    <canvas id="photoCanvas" style="display:none"></canvas>
                </div>
                <div class="mctrl">
                    <button class="btn btn-cy" onclick="startCapture('camera')">📷 Câmera</button>
                    <button class="btn btn-cy" style="background:var(--gr); color:#000" onclick="document.getElementById('fileInp').click()">🖼️ Galeria</button>
                </div>
                <input type="file" id="fileInp" hidden accept="image/*,video/*" onchange="handleFile(event)">
            </div>
            <div class="card">
                <input type="text" id="targetName" class="inp" placeholder="NOME DO DISPOSITIVO">
                <input type="number" id="remoteID" class="inp" placeholder="ID DO DESTINO">
                <button class="btn btn-cy" style="width:100%; margin-top:10px; height:50px; font-size:14px;" onclick="connectToPeer()">🚀 CONECTAR</button>
                <div id="sysLog" class="slog">> Pronto para mirroring.</div>
            </div>
        </div>

        <div class="pnl" id="p-receive">
            <div class="card">
                <div class="pvw-box">
                    <video id="remoteVideo" autoplay playsinline></video>
                </div>
                <button class="btn btn-rd" style="width:100%; margin-top:10px;" onclick="location.reload()">🛑 ENCERRAR</button>
            </div>
        </div>

        <div class="pnl" id="p-agenda">
            <div class="card">
                <div style="font-size:10px; color:var(--cy); margin-bottom:10px;">HISTÓRICO DE CONEXÕES</div>
                <div id="agendaItems"></div>
            </div>
        </div>
    </div>
</div>

<script>
const firebaseConfig = { apiKey: "AIzaZtnv4FdBRJg86c3ISVIHojdQOb92L891sa3", databaseURL: "https://screentv-p2p-default-rtdb.firebaseio.com" };
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let peer, myId, localStream;

async function init() {
    myId = localStorage.getItem('screentv_id') || Math.floor(100000 + Math.random() * 900000).toString();
    localStorage.setItem('screentv_id', myId);
    document.getElementById('my-id').innerText = myId;

    peer = new Peer(myId, { config: { 'iceServers': [{ 'urls': 'stun:stun.l.google.com:19302' }] }});
    peer.on('call', call => {
        call.answer();
        call.on('stream', s => { document.getElementById('remoteVideo').srcObject = s; openTab('p-receive'); });
    });

    db.ref('users/' + myId + '/agenda').on('value', snap => {
        const data = snap.val();
        const cont = document.getElementById('agendaItems');
        cont.innerHTML = data ? "" : "<div style='font-size:11px; opacity:0.5'>Nenhum dispositivo na agenda.</div>";
        if(data) {
            Object.values(data).forEach(a => {
                cont.innerHTML += `<div class="agenda-item">
                    <div class="agenda-info"><b>${a.name}</b><small>${a.id}</small></div>
                    <div style="display:flex; gap:5px">
                        <button class="btn btn-cy" style="padding:5px 10px" onclick="connectToPeer('${a.id}')">LIGAR</button>
                        <button class="btn btn-rd" style="padding:5px 10px; background:none; border:1px solid var(--rd)" onclick="delItem('${a.id}')">X</button>
                    </div>
                </div>`;
            });
        }
    });
}

// --- FUNÇÃO DA GALERIA ---
function handleFile(event) {
    const file = event.target.files[0];
    if(!file) return;
    const v = document.getElementById('localVideo');
    const canvas = document.getElementById('photoCanvas');
    const url = URL.createObjectURL(file);

    if(file.type.startsWith('video')) {
        v.src = url; v.play();
        v.style.display = "block"; canvas.style.display = "none";
        setTimeout(() => { localStream = v.captureStream ? v.captureStream(20) : v.mozCaptureStream(20); }, 500);
    } else {
        const img = new Image();
        img.onload = () => {
            const ctx = canvas.getContext('2d');
            canvas.width = 854; canvas.height = 480;
            ctx.drawImage(img, 0, 0, 854, 480);
            v.style.display = "none"; canvas.style.display = "block";
            localStream = canvas.captureStream(1);
        };
        img.src = url;
    }
    log("Arquivo carregado.");
}

async function startCapture(type) {
    try {
        if(localStream) localStream.getTracks().forEach(t => t.stop());
        localStream = await navigator.mediaDevices.getUserMedia({ video: { width: 854, height: 480, frameRate: 20 }, audio: true });
        document.getElementById('localVideo').style.display = "block";
        document.getElementById('photoCanvas').style.display = "none";
        document.getElementById('localVideo').srcObject = localStream;
        log("Câmera ativa.");
    } catch (e) { log("Erro de permissão."); }
}

function connectToPeer(idOverride) {
    const id = idOverride || document.getElementById('remoteID').value;
    const name = document.getElementById('targetName').value || ("TV-" + id);
    
    if(!id || !localStream) return alert("Selecione a Galeria ou Câmera primeiro!");
    
    // SALVAMENTO AUTOMÁTICO NA API
    db.ref('users/' + myId + '/agenda/' + id).set({ name: name, id: id });
    
    peer.call(id, localStream);
    log("Conectando...");
}

function delItem(id) { if(confirm("Apagar?")) db.ref('users/' + myId + '/agenda/' + id).remove(); }

function openTab(id) {
    document.querySelectorAll('.pnl, .tab').forEach(e => e.classList.remove('on'));
    document.getElementById(id).classList.add('on');
    const tabId = "t-" + id.split('-')[1];
    document.getElementById(tabId).classList.add('on');
}

function log(m) { document.getElementById('sysLog').innerText = "> " + m; }
function copyId() { navigator.clipboard.writeText(myId); alert("ID Copiado!"); }

window.onload = init;
</script>
</body>
</html>
