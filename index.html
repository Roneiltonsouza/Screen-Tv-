<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Screen TV</title>
<link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@300;400;600;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#06080f; --sur:#0c1220; --card:#101828; --card2:#131f32;
  --bor:#1c2f50; --bor2:#243a60;
  --cy:#00e5ff; --bl:#0057ff; --gr:#00ff9d;
  --or:#ff7b00; --rd:#ff2d55; --pu:#bf5fff;
  --tx:#b8d0f0; --tx2:#5a7aa8; --wh:#e8f4ff;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;background:var(--bg);font-family:'Exo 2',sans-serif;color:var(--tx);overflow:hidden;}

.bg1{position:fixed;inset:0;z-index:0;pointer-events:none;
  background:radial-gradient(ellipse 60% 40% at 15% 50%,rgba(0,87,255,.06) 0%,transparent 70%),
             radial-gradient(ellipse 50% 60% at 85% 30%,rgba(0,229,255,.05) 0%,transparent 70%);}
.bg2{position:fixed;inset:0;z-index:0;pointer-events:none;
  background-image:linear-gradient(rgba(0,229,255,.025) 1px,transparent 1px),
                   linear-gradient(90deg,rgba(0,229,255,.025) 1px,transparent 1px);
  background-size:50px 50px;}

#app{position:relative;z-index:1;display:flex;flex-direction:column;height:100vh;max-width:1280px;margin:0 auto;}

/* Header */
#hdr{display:flex;align-items:center;justify-content:space-between;padding:0 20px;height:56px;
  border-bottom:1px solid var(--bor);background:rgba(6,8,15,.92);backdrop-filter:blur(12px);flex-shrink:0;}
.logo{display:flex;align-items:center;gap:12px;}
.logo-mark{width:36px;height:36px;background:linear-gradient(135deg,var(--bl),var(--cy));
  border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;box-shadow:0 0 18px rgba(0,229,255,.35);}
.logo-tx{font-weight:900;font-size:20px;letter-spacing:1px;
  background:linear-gradient(90deg,#fff 30%,var(--cy));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.logo-sub{font-size:10px;color:var(--tx2);letter-spacing:3px;display:block;margin-top:-4px;font-family:'Share Tech Mono',monospace;}
.id-badge{display:flex;align-items:center;gap:10px;background:var(--card);border:1px solid var(--bor);
  border-radius:10px;padding:6px 14px;cursor:pointer;transition:border-color .2s;}
.id-badge:hover{border-color:var(--cy);}
.id-label{font-size:10px;color:var(--tx2);letter-spacing:2px;font-family:'Share Tech Mono',monospace;}
.id-val{font-family:'Share Tech Mono',monospace;font-size:18px;font-weight:700;color:var(--cy);letter-spacing:3px;}
.hdr-right{display:flex;align-items:center;gap:8px;font-family:'Share Tech Mono',monospace;font-size:11px;color:var(--tx2);}
.sdot{width:8px;height:8px;border-radius:50%;background:var(--tx2);transition:all .3s;}
.sdot.live{background:var(--gr);box-shadow:0 0 8px var(--gr);animation:blink 1.4s infinite;}
.sdot.err{background:var(--rd);box-shadow:0 0 8px var(--rd);}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}

/* Tabs */
#tabs{display:flex;gap:2px;padding:10px 20px 0;border-bottom:1px solid var(--bor);
  background:rgba(6,8,15,.7);flex-shrink:0;overflow-x:auto;}
.tab{padding:8px 18px;border-radius:8px 8px 0 0;font-size:13px;font-weight:600;cursor:pointer;
  color:var(--tx2);border:1px solid transparent;border-bottom:none;transition:all .2s;white-space:nowrap;}
.tab.on{background:var(--card);border-color:var(--bor);border-bottom-color:var(--card);color:var(--wh);margin-bottom:-1px;}
.tab:hover:not(.on){color:var(--cy);}

/* Panels */
#panels{flex:1;overflow-y:auto;overflow-x:hidden;}
#panels::-webkit-scrollbar{width:5px;}
#panels::-webkit-scrollbar-thumb{background:var(--bor);border-radius:3px;}
.pnl{display:none;padding:20px;}
.pnl.on{display:block;}

/* Layout */
.g3{display:grid;grid-template-columns:2fr 1fr;gap:16px;}
.fc{display:flex;flex-direction:column;gap:12px;}
.mctrl{display:flex; flex-wrap: wrap; gap: 10px;}

/* Card */
.card{background:var(--card);border:1px solid var(--bor);border-radius:14px;padding:18px;position:relative;overflow:hidden;}
.card::after{content:'';position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,rgba(0,229,255,.35),transparent);}
.ctitle{font-family:'Share Tech Mono',monospace;font-size:10px;letter-spacing:3px;color:var(--tx2);
  text-transform:uppercase;margin-bottom:14px;display:flex;align-items:center;gap:8px;}
.ctitle::after{content:'';flex:1;height:1px;background:var(--bor);}

/* Buttons */
.btn{padding:10px 16px;border:none;border-radius:9px;font-family:'Exo 2',sans-serif;font-weight:700;
  font-size:13px;cursor:pointer;transition:all .18s;display:inline-flex;align-items:center;gap:7px;white-space:nowrap;}
.btn-cy{background:linear-gradient(135deg,var(--bl),var(--cy));color:#fff;box-shadow:0 0 18px rgba(0,229,255,.2);}
.btn-cy:hover{box-shadow:0 0 28px rgba(0,229,255,.4);transform:translateY(-1px);}
.btn-gh{background:var(--sur);border:1px solid var(--bor);color:var(--tx);}
.btn-gh:hover{border-color:var(--cy);color:var(--cy);}
.btn-rd{background:rgba(255,45,85,.1);border:1px solid var(--rd);color:var(--rd);}
.btn-rd:hover{background:rgba(255,45,85,.2);}
.bfull{width:100%;justify-content:center;}

/* Input */
.inp{width:100%;padding:10px 12px;background:var(--sur);border:1px solid var(--bor);
  border-radius:9px;color:var(--wh);font-family:'Exo 2',sans-serif;font-size:14px;outline:none;transition:border-color .2s;}
.inp:focus{border-color:var(--cy);}

/* Preview */
.pvw{aspect-ratio:16/9;background:#000;border-radius:10px;border:2px solid var(--bor);
  position:relative;overflow:hidden;margin-bottom:12px; display: flex; align-items: center; justify-content: center;}
.pvw video, .pvw img{max-width: 100%; max-height: 100%; object-fit: contain; display: none;}
.povl{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;
  justify-content:center;gap:8px;background:rgba(0,0,0,.78);transition:opacity .25s;pointer-events:none; z-index: 5;}
.povl.hide{opacity:0;}
.povl-icon{font-size:48px;opacity:.3;}
.povl p{font-size:13px;color:var(--tx2);text-align:center;line-height:1.6;}

/* Stats */
.sg{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;}
.sb{background:var(--sur);border:1px solid var(--bor);border-radius:8px;padding:10px;text-align:center;}
.sv{font-family:'Share Tech Mono',monospace;font-size:18px;color:var(--cy);font-weight:700;}
.sl2{font-size:9px;color:var(--tx2);letter-spacing:2px;margin-top:2px;text-transform:uppercase;}

.slog{background:#000;border:1px solid var(--bor);border-radius:8px;padding:9px;
  height:88px;overflow-y:auto;font-family:'Share Tech Mono',monospace;font-size:10px;color:var(--tx2);}

@media(max-width:680px){
  .g3,.sg{grid-template-columns:1fr;}
  .pnl{padding:12px;}
}
</style>
</head>
<body>
<div class="bg1"></div>
<div class="bg2"></div>
<div id="app">

  <div id="hdr">
    <div class="logo">
      <div class="logo-mark">📺</div>
      <div><div class="logo-tx">Screen TV</div><span class="logo-sub">CAST &amp; MIRROR SYSTEM</span></div>
    </div>
    <div class="id-badge" id="idBadge" onclick="copyMyID()">
      <div><div class="id-label">MEU ID</div><div class="id-val" id="idDisplay">482-910</div></div>
      <span style="font-size:12px;color:var(--tx2);">📋</span>
    </div>
    <div class="hdr-right">
      <div class="sdot" id="statusDot"></div>
      <span id="statusTxt">OFFLINE</span>
    </div>
  </div>

  <div id="tabs">
    <div class="tab on" data-target="p-mirror">🖥️ Espelhar</div>
    <div class="tab" data-target="p-connect">🔗 Conectar ID</div>
  </div>

  <div id="panels">
    <div class="pnl on" id="p-mirror">
      <div class="g3">
        <div class="fc">
          <div class="card">
            <div class="ctitle" id="mainLbl">🎥 TRANSMISSÃO AO VIVO</div>
            <div class="pvw">
              <video id="mainVid" autoplay playsinline muted></video>
              <img id="mainImg" alt="Preview Galeria">
              <div class="povl" id="mainOvl">
                <div class="povl-icon">🖥️</div>
                <p>Nenhuma fonte ativa<br><small>Selecione uma opção abaixo</small></p>
              </div>
            </div>
            <div class="mctrl">
               <button class="btn btn-cy" onclick="startMirror()">🚀 Espelhar Tela</button>
               <button class="btn btn-gh" onclick="startCamera()">📷 Ativar Câmera</button>
               <button class="btn btn-gh" onclick="document.getElementById('galleryInput').click()">🖼️ Abrir Galeria</button>
               <input type="file" id="galleryInput" hidden accept="image/*,video/*" onchange="loadFromGallery(event)">
               <button class="btn btn-rd" onclick="stopCapture()">🛑 Parar</button>
            </div>
          </div>
          <div class="card">
            <div class="ctitle">📜 Log do Sistema</div>
            <div class="slog" id="systemLog">
              > Sistema inicializado...<br>
              > Aguardando ação do usuário...
            </div>
          </div>
        </div>
        
        <div class="fc">
            <div class="card">
                <div class="ctitle">📊 STATUS DA TRANSMISSÃO</div>
                <div class="sg">
                    <div class="sb"><div class="sv" id="statFps">0</div><div class="sl2">FPS</div></div>
                    <div class="sb"><div class="sv" id="statRes">--</div><div class="sl2">RES</div></div>
                </div>
            </div>
        </div>
      </div>
    </div>

    <div class="pnl" id="p-connect">
        <div class="card">
            <div class="ctitle">🔗 CONECTAR VIA ID</div>
            <div class="fc">
                <input type="text" class="inp" placeholder="Insira o ID da TV ou PC">
                <button class="btn btn-cy bfull">Vincular Dispositivo</button>
            </div>
        </div>
    </div>
  </div>
</div>

<script>
const tabs = document.querySelectorAll('.tab');
const panels = document.querySelectorAll('.pnl');

tabs.forEach(tab => {
    tab.addEventListener('click', () => {
        tabs.forEach(t => t.classList.remove('on'));
        panels.forEach(p => p.classList.remove('on'));
        tab.classList.add('on');
        const target = tab.getAttribute('data-target');
        document.getElementById(target).classList.add('on');
    });
});

const videoElement = document.getElementById('mainVid');
const imageElement = document.getElementById('mainImg');
const overlay = document.getElementById('mainOvl');
const logElement = document.getElementById('systemLog');
const statusDot = document.getElementById('statusDot');
const statusTxt = document.getElementById('statusTxt');
let currentStream = null;

function addLog(msg, type = '') {
    const now = new Date().toLocaleTimeString();
    logElement.innerHTML += `<div style="color:${type}">[${now}] ${msg}</div>`;
    logElement.scrollTop = logElement.scrollHeight;
}

async function startMirror() {
    try {
        stopCapture();
        const stream = await navigator.mediaDevices.getDisplayMedia({
            video: { cursor: "always" },
            audio: true
        });
        videoElement.style.display = "block";
        imageElement.style.display = "none";
        handleSuccess(stream, "Tela compartilhada");
    } catch (err) {
        addLog("Erro ao espelhar tela: " + err.message, "var(--rd)");
    }
}

async function startCamera() {
    try {
        stopCapture();
        const stream = await navigator.mediaDevices.getUserMedia({
            video: true,
            audio: true
        });
        videoElement.style.display = "block";
        imageElement.style.display = "none";
        handleSuccess(stream, "Câmera ativada");
    } catch (err) {
        addLog("Erro ao acessar câmera: " + err.message, "var(--rd)");
    }
}

// Função para Carregar Arquivo da Galeria
function loadFromGallery(event) {
    const file = event.target.files[0];
    if (!file) return;

    stopCapture();
    overlay.classList.add('hide');
    statusDot.classList.add('live');
    statusTxt.innerText = "TRANSFERINDO";
    statusTxt.style.color = "var(--cy)";

    const url = URL.createObjectURL(file);

    if (file.type.startsWith('video')) {
        imageElement.style.display = "none";
        videoElement.style.display = "block";
        videoElement.src = url;
        videoElement.loop = true;
        videoElement.play();
        addLog("Vídeo da galeria carregado.", "var(--gr)");
    } else {
        videoElement.style.display = "none";
        imageElement.style.display = "block";
        imageElement.src = url;
        addLog("Imagem da galeria carregada.", "var(--gr)");
    }
    
    document.getElementById('statRes').innerText = "FILE";
    document.getElementById('statFps').innerText = "--";
}

function handleSuccess(stream, sourceName) {
    currentStream = stream;
    videoElement.srcObject = stream;
    overlay.classList.add('hide');
    statusDot.classList.add('live');
    statusTxt.innerText = "LIVE";
    statusTxt.style.color = "var(--gr)";
    addLog(`${sourceName} com sucesso!`, "var(--gr)");
    
    const videoTrack = stream.getVideoTracks()[0];
    const settings = videoTrack.getSettings();
    document.getElementById('statFps').innerText = Math.round(settings.frameRate || 0);
    document.getElementById('statRes').innerText = settings.height + 'p';
    videoTrack.onended = () => stopCapture();
}

function stopCapture() {
    if (currentStream) {
        currentStream.getTracks().forEach(track => track.stop());
        currentStream = null;
    }
    videoElement.srcObject = null;
    videoElement.src = "";
    imageElement.src = "";
    videoElement.style.display = "none";
    imageElement.style.display = "none";
    
    overlay.classList.remove('hide');
    statusDot.classList.remove('live');
    statusTxt.innerText = "OFFLINE";
    statusTxt.style.color = "var(--tx2)";
    document.getElementById('statFps').innerText = "0";
    document.getElementById('statRes').innerText = "--";
    addLog("Captura encerrada.");
}

function copyMyID() {
    const id = document.getElementById('idDisplay').innerText;
    navigator.clipboard.writeText(id);
    addLog("ID copiado para a área de transferência!", "var(--cy)");
}

window.onload = () => {
    addLog("Sistema Pronto. Selecione uma fonte para transmitir.");
};
</script>
</body>
  </html>
