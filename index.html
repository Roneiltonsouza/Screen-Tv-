<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Screen TV - P2P Transfer</title>
<link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@300;400;600;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#06080f; --sur:#0c1220; --card:#101828; --bor:#1c2f50;
  --cy:#00e5ff; --bl:#0057ff; --gr:#00ff9d; --rd:#ff2d55;
  --tx:#b8d0f0; --tx2:#5a7aa8; --wh:#e8f4ff;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);font-family:'Exo 2',sans-serif;color:var(--tx);overflow:hidden;height:100vh;}
.bg1{position:fixed;inset:0;z-index:0;background:radial-gradient(ellipse at 15% 50%,rgba(0,87,255,.06) 0%,transparent 70%);}

#app{position:relative;z-index:1;display:flex;flex-direction:column;height:100vh;max-width:1280px;margin:0 auto;}

/* Header */
#hdr{display:flex;align-items:center;justify-content:space-between;padding:0 20px;height:60px;border-bottom:1px solid var(--bor);background:rgba(6,8,15,.9);backdrop-filter:blur(10px);}
.logo-tx{font-weight:900;font-size:20px;background:linear-gradient(90deg,#fff,var(--cy));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.id-badge{background:var(--card);border:1px solid var(--bor);border-radius:10px;padding:6px 14px;cursor:pointer;text-align:center;}
.id-val{font-family:'Share Tech Mono',monospace;font-size:16px;color:var(--cy);letter-spacing:1px;}

/* Tabs */
#tabs{display:flex;gap:2px;padding:10px 20px 0;border-bottom:1px solid var(--bor);background:rgba(6,8,15,.5);}
.tab{padding:10px 20px;border-radius:8px 8px 0 0;font-size:13px;font-weight:600;cursor:pointer;color:var(--tx2);transition:0.3s;}
.tab.on{background:var(--card);color:var(--wh);border:1px solid var(--bor);border-bottom:none;margin-bottom:-1px;}

/* Content */
#panels{flex:1;overflow-y:auto;padding:20px;}
.pnl{display:none;} .pnl.on{display:block;}

.card{background:var(--card);border:1px solid var(--bor);border-radius:14px;padding:18px;margin-bottom:16px;}
.ctitle{font-family:'Share Tech Mono',monospace;font-size:10px;color:var(--tx2);margin-bottom:12px;letter-spacing:2px;}

/* Video Preview */
.pvw{aspect-ratio:16/9;background:#000;border-radius:10px;border:2px solid var(--bor);position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center;}
#mainVid, #remoteVid {width:100%;height:100%;object-fit:contain;display:none;}
.povl{position:absolute;text-align:center;}

/* Buttons */
.mctrl{display:flex;gap:10px;flex-wrap:wrap;margin-top:15px;}
.btn{padding:12px 18px;border:none;border-radius:9px;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:8px;transition:0.2s;}
.btn-cy{background:var(--bl);color:#fff;}
.btn-gh{background:var(--sur);border:1px solid var(--bor);color:var(--tx);}
.btn-rd{background:rgba(255,45,85,.1);border:1px solid var(--rd);color:var(--rd);}

.inp{width:100%;padding:12px;background:#06080f;border:1px solid var(--bor);border-radius:8px;color:#fff;margin-bottom:10px;}
.slog{background:#000;padding:10px;height:100px;overflow-y:auto;font-family:'Share Tech Mono',monospace;font-size:11px;border-radius:8px;border:1px solid var(--bor);}
</style>
</head>
<body>
<div class="bg1"></div>
<div id="app">
  <div id="hdr">
    <div class="logo">
      <div class="logo-tx">Screen TV</div>
    </div>
    <div class="id-badge" onclick="copyMyID()">
      <div style="font-size:9px;color:var(--tx2)">MEU STATUS</div>
      <div class="id-val" id="connectionStatus">DISPONÍVEL</div>
    </div>
  </div>

  <div id="tabs">
    <div class="tab on" data-target="p-transmit">📤 Transmitir</div>
    <div class="tab" data-target="p-receive">📥 Receber</div>
  </div>

  <div id="panels">
    <div class="pnl on" id="p-transmit">
      <div class="card">
        <div class="ctitle">PRÉ-VISUALIZAÇÃO LOCAL</div>
        <div class="pvw">
          <video id="mainVid" autoplay playsinline muted></video>
          <img id="mainImg" style="display:none; max-width:100%">
          <div class="povl" id="localOvl">📸 Sem sinal</div>
        </div>
        <div class="mctrl">
          <button class="btn btn-cy" onclick="startStream('screen')">📱 Tela</button>
          <button class="btn btn-gh" onclick="startStream('camera')">📷 Câmera</button>
          <button class="btn btn-gh" onclick="document.getElementById('fileInp').click()">🖼️ Galeria</button>
          <input type="file" id="fileInp" hidden accept="image/*,video/*" onchange="handleFile(event)">
          <button class="btn btn-rd" onclick="stopAll()">🛑 Parar</button>
        </div>
      </div>

      <div class="card">
        <div class="ctitle">CONEXÃO P2P (COPIE O TOKEN PARA O OUTRO CELULAR)</div>
        <textarea id="localOffer" class="inp" placeholder="Token de conexão aparecerá aqui..." readonly rows="3"></textarea>
        <button class="btn btn-cy bfull" onclick="copyToken()">📋 Copiar Token de Convite</button>
        <div style="margin-top:15px">
          <input type="text" id="remoteAnswer" class="inp" placeholder="Cole a Resposta do outro celular aqui">
          <button class="btn btn-gh bfull" onclick="connectToRemote()">🔗 Finalizar Conexão</button>
        </div>
      </div>
    </div>

    <div class="pnl" id="p-receive">
      <div class="card">
        <div class="ctitle">SINAL RECEBIDO</div>
        <div class="pvw">
          <video id="remoteVid" autoplay playsinline></video>
          <div class="povl" id="remoteOvl">⏳ Aguardando conexão...</div>
        </div>
      </div>
      <div class="card">
        <div class="ctitle">VINCULAR TRANSMISSOR</div>
        <textarea id="incomingOffer" class="inp" placeholder="Cole o Token do transmissor aqui..." rows="3"></textarea>
        <button class="btn btn-cy bfull" onclick="acceptInvitation()">✔️ Gerar Resposta</button>
        <div id="answerSection" style="display:none; margin-top:15px">
          <p style="font-size:11px; margin-bottom:5px">Envie este código de volta:</p>
          <textarea id="generatedAnswer" class="inp" readonly rows="3"></textarea>
          <button class="btn btn-gh bfull" onclick="copyAnswer()">📋 Copiar Resposta</button>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="ctitle">LOG DO SISTEMA</div>
      <div class="slog" id="sysLog">> Sistema Screen TV pronto...</div>
    </div>
  </div>
</div>

<script>
// --- CONFIGURAÇÃO WEBRTC ---
let localStream;
let peerConnection;
const config = { iceServers: [{ urls: "stun:stun.l.google.com:19302" }] };

const log = (msg) => {
  const l = document.getElementById('sysLog');
  l.innerHTML += `<div>> ${msg}</div>`;
  l.scrollTop = l.scrollHeight;
};

// --- FUNÇÕES DE MÍDIA ---
async function startStream(type) {
  try {
    stopAll();
    localStream = (type === 'screen') 
      ? await navigator.mediaDevices.getDisplayMedia({ video: true, audio: true })
      : await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
    
    document.getElementById('mainVid').srcObject = localStream;
    document.getElementById('mainVid').style.display = "block";
    document.getElementById('localOvl').style.display = "none";
    log(`Capturando ${type}...`);
    
    // Se já houver conexão, substitui o track
    if(peerConnection) {
        localStream.getTracks().forEach(track => peerConnection.addTrack(track, localStream));
    }
    createOffer(); // Gera o token para o outro celular
  } catch (e) { log("Erro: " + e.message); }
}

function handleFile(e) {
  const file = e.target.files[0];
  if(!file) return;
  const url = URL.createObjectURL(file);
  document.getElementById('localOvl').style.display = "none";
  
  if(file.type.startsWith('video')) {
    const v = document.getElementById('mainVid');
    v.src = url; v.style.display = "block"; v.play();
  } else {
    const i = document.getElementById('mainImg');
    i.src = url; i.style.display = "block";
  }
  log("Arquivo pronto para transmissão.");
}

function stopAll() {
  if(localStream) localStream.getTracks().forEach(t => t.stop());
  document.getElementById('mainVid').srcObject = null;
  log("Transmissão parada.");
}

// --- LÓGICA DE CONEXÃO (O "PULO DO GATO") ---

// 1. TRANSMISSOR cria a oferta
async function createOffer() {
  peerConnection = new RTCPeerConnection(config);
  if(localStream) localStream.getTracks().forEach(t => peerConnection.addTrack(t, localStream));

  peerConnection.onicecandidate = e => {
    if(!e.candidate) {
      document.getElementById('localOffer').value = btoa(JSON.stringify(peerConnection.localDescription));
      log("Token de convite gerado!");
    }
  };
  
  const offer = await peerConnection.createOffer();
  await peerConnection.setLocalDescription(offer);
}

// 2. RECEPTOR aceita e gera resposta
async function acceptInvitation() {
  const offerStr = document.getElementById('incomingOffer').value;
  if(!offerStr) return alert("Cole o token primeiro!");
  
  peerConnection = new RTCPeerConnection(config);
  
  peerConnection.ontrack = e => {
    log("Recebendo vídeo remoto...");
    const rv = document.getElementById('remoteVid');
    rv.srcObject = e.streams[0];
    rv.style.display = "block";
    document.getElementById('remoteOvl').style.display = "none";
  };

  const offer = JSON.parse(atob(offerStr));
  await peerConnection.setRemoteDescription(new RTCSessionDescription(offer));
  
  const answer = await peerConnection.createAnswer();
  await peerConnection.setLocalDescription(answer);
  
  peerConnection.onicecandidate = e => {
    if(!e.candidate) {
      document.getElementById('generatedAnswer').value = btoa(JSON.stringify(peerConnection.localDescription));
      document.getElementById('answerSection').style.display = "block";
      log("Resposta gerada! Envie ao transmissor.");
    }
  };
}

// 3. TRANSMISSOR finaliza a conexão
async function connectToRemote() {
  const ansStr = document.getElementById('remoteAnswer').value;
  if(!ansStr) return alert("Cole a resposta do receptor!");
  
  const answer = JSON.parse(atob(ansStr));
  await peerConnection.setRemoteDescription(new RTCSessionDescription(answer));
  log("Conexão estabelecida com sucesso!");
  document.getElementById('connectionStatus').innerText = "CONECTADO";
}

// --- UTILITÁRIOS ---
function copyToken() {
  const t = document.getElementById('localOffer');
  t.select(); document.execCommand('copy');
  log("Token copiado! Cole no celular que vai receber.");
}

function copyAnswer() {
  const t = document.getElementById('generatedAnswer');
  t.select(); document.execCommand('copy');
  log("Resposta copiada! Cole no celular que está transmitindo.");
}

// Navegação de abas
document.querySelectorAll('.tab').forEach(tab => {
  tab.onclick = () => {
    document.querySelectorAll('.tab, .pnl').forEach(el => el.classList.remove('on'));
    tab.classList.add('on');
    document.getElementById(tab.dataset.target).classList.add('on');
  };
});
</script>
</body>
</html>
